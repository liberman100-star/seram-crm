<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root{--primary:#1f4e79;--secondary:#e8eef5}
    body{font-family:Arial,sans-serif;margin:0;background:#f4f6f8;color:#222}
    header{background:var(--primary);color:#fff;padding:14px 24px;font-size:24px;font-weight:bold;position:sticky;top:0;z-index:10;cursor:pointer;display:flex;align-items:center;gap:12px}
    header img{max-width:180px;object-fit:contain;background:white;border-radius:6px;padding:3px}
    nav{display:flex;gap:8px;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:64px;z-index:9;flex-wrap:wrap}
    button{border:0;padding:9px 14px;border-radius:8px;cursor:pointer;background:#e8eef5}
    button:hover{opacity:.9}
    nav button.active,.primary{background:var(--primary);color:white}
    .danger{background:#c00000;color:white}
    .ok{background:#38761d;color:white}
    main{padding:20px}
    .hidden{display:none!important}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .card{background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px #0001;margin-bottom:14px}
    .card h3{margin-top:0;color:var(--primary)}
    table{width:100%;border-collapse:collapse;background:white;margin-top:12px}
    th,td{padding:9px;border-bottom:1px solid #eee;text-align:right;vertical-align:top}
    th{background:#d9eaf7}
    input,select,textarea{width:100%;padding:8px;margin:5px 0 10px;box-sizing:border-box}
    textarea{min-height:70px}
    .toolbar{display:flex;gap:10px;align-items:center;margin:10px 0;flex-wrap:wrap}
    .toolbar input{max-width:320px}
    .modal{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center;z-index:999}
    .box{background:white;padding:22px;border-radius:12px;width:860px;max-width:94vw;max-height:88vh;overflow:auto}
    .box.small{width:480px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .sectionTitle{margin-top:22px;border-top:1px solid #eee;padding-top:15px;color:var(--primary)}
    .muted{color:#666;font-size:13px}
    .linkish{color:var(--primary);cursor:pointer;text-decoration:underline}
    .clickable-row{cursor:pointer}
    .clickable-row:hover{background:#f2f7fb}
    ul{padding-right:18px}
    li{margin-bottom:7px}
    .settings-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}
    .settings-tabs button.active{background:var(--primary);color:#fff}
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;background:#eef3f8;margin:2px;font-size:12px}
  
    .login-screen{position:fixed;inset:0;background:#f4f6f8;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 4px 20px #0002;width:420px;max-width:95vw;padding:28px;text-align:right}
    .login-card h1{margin-top:0;color:var(--primary);font-size:25px}
    .login-card .login-title{font-size:18px;margin-bottom:18px;line-height:1.6}
    .login-message{margin-top:10px;color:#666;font-size:14px;min-height:20px}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px}
    #brandArea{display:flex;align-items:center;gap:10px}
    #systemLogoImg{max-height:34px;max-width:140px;background:#fff;border-radius:6px;display:none;object-fit:contain}
    #userArea{font-size:14px;font-weight:normal;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    #userArea button{padding:6px 10px;background:#ffffff22;color:#fff;border:1px solid #ffffff55}

    .dashboard-calendar{background:#fff;border-radius:12px;box-shadow:0 2px 8px #0001;padding:14px;margin:18px 0}
    .calendar-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 12px}
    .calendar-title{font-weight:bold;color:var(--primary);font-size:18px;background:#fff;border:1px solid #d7e3ef;border-radius:8px;padding:8px 14px;min-width:170px;text-align:center}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .calendar-day{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;min-height:105px;padding:8px;overflow:hidden}
    .calendar-day.today{outline:2px solid var(--primary)}
    .calendar-day-head{font-weight:bold;margin-bottom:4px;font-size:13px}
    .calendar-hebrew{color:#666;font-size:12px;margin-bottom:6px}
    .calendar-event{display:block;border-radius:7px;padding:4px 6px;margin:4px 0;font-size:12px;cursor:pointer;background:#eef3f8;border-right:4px solid #999}
    .calendar-event:hover{opacity:.85}
    .prio-נמוכה{border-right-color:#999}
    .prio-רגילה{border-right-color:#38761d}
    .prio-גבוהה{border-right-color:#f6b26b}
    .prio-דחופה{border-right-color:#c00000;background:#fdecec}
    .sort-select{max-width:190px}

@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap');
:root{
  --primary:#1E3A5F;
  --primary2:#2E6FF2;
  --bg:#F8FAFC;
  --surface:#FFFFFF;
  --border:#E2E8F0;
  --muted:#64748B;
  --text:#0F172A;
  --success:#16A34A;
  --danger:#DC2626;
  --warning:#F97316;
  --sidebar:236px;
  --radius:16px;
}
*{box-sizing:border-box}
body{font-family:'Heebo',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45}
header{
  margin-right:var(--sidebar);background:linear-gradient(135deg,var(--primary),#0F2742)!important;

}
#brandArea{gap:12px!important}
#systemNameText{font-size:23px;font-weight:800;letter-spacing:-.3px}
#systemLogoImg{box-shadow:0 4px 14px #0002;border:1px solid #ffffff44}
#userArea{background:#ffffff1c;border:1px solid #ffffff2c;border-radius:999px;padding:6px 10px}
#userGreeting{font-weight:600}
#userArea button{border-radius:999px!important;background:#fff!important;color:var(--primary)!important;border:0!important;font-weight:700}
nav{
  position:fixed!important;right:0!important;top:0!important;bottom:0!important;width:var(--sidebar)!important;
  display:flex!important;flex-direction:column!important;gap:8px!important;z-index:20!important;
  padding:22px 14px!important;background:#fff!important;border-left:1px solid var(--border)!important;border-bottom:0!important;
  box-shadow:-8px 0 30px #0f172a0c;overflow:auto;align-items:stretch!important;
}
nav:before{content:'בית חכם';display:block;font-weight:800;font-size:22px;color:var(--primary);padding:6px 10px 18px;border-bottom:1px solid var(--border);margin-bottom:10px}
nav button{width:100%;text-align:right;border-radius:14px!important;background:transparent!important;color:var(--text)!important;font-weight:700;padding:12px 14px!important;transition:.18s ease}
nav button:hover{background:#EFF6FF!important;opacity:1;transform:translateX(-2px)}
nav button.active{background:linear-gradient(135deg,var(--primary2),#1D4ED8)!important;color:#fff!important;box-shadow:0 10px 22px #2e6ff23a}
main{margin-right:var(--sidebar);padding:24px 28px 40px!important}
h2{font-size:28px;letter-spacing:-.5px;margin:4px 0 18px;color:var(--primary);font-weight:800}

.card,.dashboard-calendar,.box,table{border:1px solid var(--border);box-shadow:0 10px 26px #0f172a0b!important;border-radius:var(--radius)!important;background:var(--surface)!important}
.cards{grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:16px!important}
.card{padding:18px!important}.card h3{font-size:16px;color:var(--muted)!important;margin-bottom:8px}.card b{font-size:25px;color:var(--primary)}
#modernKpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin:0 0 18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 10px 26px #0f172a0b;position:relative;overflow:hidden}
.kpi-card:after{content:'';position:absolute;inset:auto auto -18px -18px;width:80px;height:80px;border-radius:50%;background:#2e6ff214}
.kpi-label{color:var(--muted);font-weight:700;font-size:14px}.kpi-value{font-size:34px;font-weight:800;color:var(--primary);line-height:1.1}.kpi-icon{font-size:22px;float:left}
button{font-family:'Heebo',Arial,sans-serif;border-radius:12px!important;font-weight:700;background:#EAF1FF;color:var(--primary);transition:.16s ease;border:1px solid transparent!important}
button:hover{opacity:1;transform:translateY(-1px);box-shadow:0 8px 18px #0f172a12}.primary{background:linear-gradient(135deg,var(--primary2),#1D4ED8)!important;color:white!important}.danger{background:var(--danger)!important;color:#fff!important}.ok{background:var(--success)!important;color:#fff!important}
input,select,textarea{font-family:'Heebo',Arial,sans-serif;border:1px solid var(--border);border-radius:12px;padding:10px 12px!important;background:#fff;outline:none;transition:.15s ease}
input:focus,select:focus,textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 3px #2e6ff21c}
.grid2,.grid3{gap:16px!important}.toolbar{gap:10px!important}.muted{color:var(--muted)!important}
table{overflow:hidden;border-collapse:separate!important;border-spacing:0!important}th{background:#F1F5F9!important;color:#334155;font-weight:800}td,th{border-bottom:1px solid var(--border)!important}tr:hover td{background:#F8FAFC}.clickable-row:hover{background:transparent!important}
.modal{backdrop-filter:blur(6px);background:#0f172a66!important}.box{padding:26px!important}.box.small{width:560px!important}.box:not(.small){width:980px!important}
.settings-tabs button{background:#EEF2FF!important}.settings-tabs button.active{background:var(--primary2)!important;color:#fff!important}
.dashboard-calendar{padding:18px!important;margin-top:20px!important}.calendar-controls{background:#F8FAFC;border:1px solid var(--border);border-radius:16px;padding:10px}.calendar-title{border:1px solid var(--border)!important;border-radius:12px!important;background:#fff!important;color:var(--primary)!important;font-weight:800!important;min-width:190px!important}.calendar-day{background:#fff!important;border:1px solid var(--border)!important;border-radius:14px!important;min-height:122px!important}.calendar-day.today{outline:3px solid #2E6FF233!important;border-color:var(--primary2)!important}.calendar-day-head{color:var(--primary);font-weight:800!important}.calendar-hebrew{color:var(--muted)!important}.calendar-event{border-radius:10px!important;background:#F8FAFC!important;border:1px solid var(--border);border-right-width:5px!important}.calendar-event.pri-low{border-right-color:#94A3B8!important}.calendar-event.pri-normal{border-right-color:#22C55E!important}.calendar-event.pri-high{border-right-color:#F97316!important}.calendar-event.pri-urgent{border-right-color:#EF4444!important}
.pri-low{color:#64748B}.pri-normal{color:#15803D}.pri-high{color:#C2410C}.pri-urgent{color:#B91C1C;font-weight:800}.pill{border:1px solid var(--border);background:#F8FAFC!important;border-radius:999px!important}
.login-screen{background:linear-gradient(135deg,#F8FAFC,#EAF1FF)!important}.login-card{border:1px solid var(--border);box-shadow:0 24px 70px #0f172a22!important}.login-card h1{font-weight:800!important;color:var(--primary)!important}
@media(max-width:900px){:root{--sidebar:0px}nav{position:sticky!important;top:68px!important;right:auto!important;bottom:auto!important;width:auto!important;flex-direction:row!important;padding:10px!important;overflow:auto}nav:before{display:none}header,main{margin-right:0!important}.cards,#modernKpis{grid-template-columns:1fr 1fr!important}.calendar-grid{grid-template-columns:1fr!important}.grid2,.grid3{grid-template-columns:1fr!important}}

<body>
<header id="systemTitle">
  <div id="brandArea" onclick="goDashboard()">
    <img id="systemLogoImg" src="" alt="לוגו">
    <span id="systemNameText">CRM סרם נדל״ן</span>
  </div>
  <div id="userArea" class="hidden">
    <span id="userGreeting"></span>
    <button onclick="logout()">התנתק</button>
  </div>
</header>

<nav>
  <div id="sideBrand" onclick="goDashboard()">
    <img id="sideLogoImg" src="" alt="לוגו">
    <span id="sideLogoFallback">בית חכם</span>
  </div>

  <button id="btn_dashboard" class="active" onclick="tab('dashboard',this)">דשבורד</button>
  <button id="btn_projects" onclick="tab('projects',this)">פרויקטים</button>
  <button id="btn_contacts" onclick="tab('contacts',this)">אנשי קשר</button>
  <button id="btn_tasks" onclick="tab('tasks',this)">משימות</button>

  <button id="btn_archive" onclick="tab('archive',this)">ארכיון</button>

  <button id="btn_settings" onclick="tab('settings',this)">הגדרות</button>
</nav>


<div id="loginScreen" class="login-screen hidden">
  <div class="login-card">
    <h1>ברוכים הבאים למערכת "בית חכם"</h1>
    <div id="loginStepEmail">
      <div class="login-title">יש להכניס שם משתמש<br><span class="muted">המייל איתו נרשמת למערכת</span></div>
      <input id="loginEmail" type="email" placeholder="כתובת מייל">
      <button class="primary" onclick="sendLoginCode()">שלח קוד</button>
    </div>
    <div id="loginStepCode" class="hidden">
      <div class="login-title">קוד כניסה נשלח למייל<br><span class="muted">יש להכניס את הקוד שקיבלת</span></div>
      <input id="loginCode" inputmode="numeric" placeholder="קוד כניסה">
      <button class="primary" onclick="verifyLoginCode()">התחבר</button>
      <button onclick="backToEmailLogin()">חזור</button>
    </div>
    <div id="loginMessage" class="login-message"></div>
  </div>
</div>

<main>
  <section id="dashboard">
    <h2>דשבורד</h2>
    <div class="cards">
      <div class="card"><h3>משימות באיחור</h3><div id="lateBox"></div></div>
      <div class="card"><h3>משימות להיום</h3><div id="todayBox"></div></div>
      <div class="card"><h3>משימות לשבוע הקרוב</h3><div id="weekBox"></div></div>
      <div class="card"><h3>פרויקטים פעילים</h3><div id="activeProjectsBox"></div></div>
    </div>
    <div class="dashboard-calendar">

<script>
let DATA = {};
let SETTINGS_TAB = 'categories';

function goDashboard(){ tab('dashboard', document.getElementById('btn_dashboard')); }
function tab(id,b){
  document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}
function modalBackdropClose(e){ if(e.target.id === 'modal') closeM(); }
function closeM(){ modal.classList.add('hidden'); }


function showLogin(msg=''){
  loginScreen.classList.remove('hidden');
  userArea.classList.add('hidden');

  loginStepEmail.classList.remove('hidden');
  loginStepCode.classList.add('hidden');

  loginCode.value = '';
  loginMessage.textContent = msg || '';
}

function hideLogin(){ loginScreen.classList.add('hidden'); }
function currentToken(){ return localStorage.getItem('CRM_SESSION_TOKEN') || ''; }
function setToken(t){ localStorage.setItem('CRM_SESSION_TOKEN', t); }
function clearToken(){ localStorage.removeItem('CRM_SESSION_TOKEN'); }

function sendLoginCode(){
  const email = (loginEmail.value || '').trim();
  loginMessage.textContent = 'שולח קוד...';
  google.script.run
    .withSuccessHandler(res=>{
      if(!res || !res.ok){ loginMessage.textContent = (res && res.message) || 'לא ניתן לשלוח קוד'; return; }
      loginStepEmail.classList.add('hidden');
      loginStepCode.classList.remove('hidden');
      loginMessage.textContent = res.message || 'קוד נשלח';
    })
    .withFailureHandler(e=> loginMessage.textContent = e.message)
    .שליחת_קוד_כניסה_Build7(email);
}

function verifyLoginCode(){
  const email = (loginEmail.value || '').trim();
  const code = (loginCode.value || '').trim();

  loginMessage.textContent = 'בודק קוד...';

  google.script.run
    .withSuccessHandler(res=>{
      if(!res || !res.ok){
        loginMessage.textContent = (res && res.message) || 'קוד שגוי';
        return;
      }

      setToken(res.token);

      try{
        localStorage.removeItem('crmLastTab');
        sessionStorage.removeItem('crmLastTab');
      }catch(e){}

      loginMessage.textContent = '';
      hideLogin();
      refreshCore();
    })
    .withFailureHandler(e=> loginMessage.textContent = e.message)
    .אימות_קוד_כניסה_Build7(email, code);
}

function backToEmailLogin(){
  loginStepCode.classList.add('hidden');
  loginStepEmail.classList.remove('hidden');
  loginCode.value='';
  loginMessage.textContent='';
}
function logout(){
  const token = currentToken();

  clearToken();

  DATA = {};
  window.DATA = {};

  try{
    localStorage.removeItem('crmLastTab');
    sessionStorage.removeItem('crmLastTab');
  }catch(e){}

  google.script.run
    .withSuccessHandler(()=>showLogin('התנתקת מהמערכת'))
    .withFailureHandler(()=>showLogin('התנתקת מהמערכת'))
    .התנתקות_Build7(token);
}

function greetingByHour(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'בוקר טוב';
  if(h >= 12 && h < 17) return 'צהריים טובים';
  if(h >= 17 && h < 22) return 'ערב טוב';
  return 'שלום';
}

function normalizePx(v){
  v = String(v || '').trim();
  if(!v) return '34px';
  return /^\d+$/.test(v) ? v + 'px' : v;
}
function normalizeLogoUrl(url){
  url = String(url || '').trim();
  if(!url) return '';
  const m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/) || url.match(/[?&]id=([^&]+)/);
  if(m && m[1]) return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(m[1]) + '&sz=w1000';
  return url;
}

function render(d){
  DATA = d || {};
  window.DATA = DATA;

  const sys = DATA.system || {};
  const u = DATA.currentUser || {};

  try{
    if(u && (u.name || u.email || u.role)){
      localStorage.setItem('CRM_USER_INFO', JSON.stringify(u));
    }
  }catch(e){}

  document.documentElement.style.setProperty('--primary', sys.primaryColor || '#1f4e79');
  document.documentElement.style.setProperty('--secondary', sys.secondaryColor || '#e8eef5');

  const systemNameEl = document.getElementById('systemNameText');
  if(systemNameEl){
    systemNameEl.textContent = sys.name || 'CRM סרם נדל״ן';
  }

  const logoUrl = normalizeLogoUrl(sys.logo || '');

  const topLogoEl = document.getElementById('systemLogoImg');
  if(topLogoEl){
    topLogoEl.style.display = 'none';
    topLogoEl.removeAttribute('src');
  }

  const sideLogoEl = document.getElementById('sideLogoImg');
  const sideFallbackEl = document.getElementById('sideLogoFallback');

  if(sideLogoEl && sideFallbackEl){
    sideFallbackEl.textContent = sys.name || 'בית חכם';

    if(logoUrl){
      sideLogoEl.src = logoUrl;
      sideLogoEl.style.display = 'block';
      sideLogoEl.style.maxHeight = normalizePx(sys.logoHeight || '68');
      sideFallbackEl.style.display = 'none';
    } else {
      sideLogoEl.style.display = 'none';
      sideLogoEl.removeAttribute('src');
      sideFallbackEl.style.display = 'inline-block';
    }
  }

  const userGreetingEl = document.getElementById('userGreeting');
  if(userGreetingEl){
    userGreetingEl.innerHTML =
      `<span>${greetingByHour()}, ${esc(u.name || u.email || '')}</span>` +
      `${u.role ? `<span class="user-role-badge">${esc(u.role)}</span>` : ''}`;
  }

  const userAreaEl = document.getElementById('userArea');
  if(userAreaEl){
    userAreaEl.classList.remove('hidden');
  }

  DATA.canSeeSettings =
    DATA.canSeeSettings === true ||
    u.isOwner === true ||
    String(u.role || '').trim() === 'מנהל ראשי';

  const settingsBtn = document.getElementById('btn_settings');
  if(settingsBtn){
    settingsBtn.style.display = DATA.canSeeSettings ? '' : 'none';
    settingsBtn.style.visibility = DATA.canSeeSettings ? '' : 'hidden';
    settingsBtn.style.pointerEvents = DATA.canSeeSettings ? '' : 'none';
  }

  const archiveBtn = document.getElementById('btn_archive');
  if(archiveBtn){
    archiveBtn.style.display = DATA.canSeeSettings ? '' : 'none';
    archiveBtn.style.visibility = DATA.canSeeSettings ? '' : 'hidden';
    archiveBtn.style.pointerEvents = DATA.canSeeSettings ? '' : 'none';
  }

  if(typeof decorateNav === 'function') decorateNav();

  renderDashboard();
  tableProjects();
  tableContacts();
  tableTasks();

  if(DATA.canSeeSettings) renderSettings();
  if(typeof renderModernKpis === 'function') renderModernKpis();
  if(typeof updateCalendarViewButtons === 'function') updateCalendarViewButtons();
  if(typeof applySecurityUI === 'function') applySecurityUI();
  if(typeof resetIdleTimer === 'function') resetIdleTimer();

  if(typeof canSeeDashboard === 'function' && !canSeeDashboard()){
    const dashboardEl = document.getElementById('dashboard');
    if(dashboardEl && !dashboardEl.classList.contains('hidden') && typeof firstVisibleTab === 'function'){
      const x = firstVisibleTab();
      if(x && x[0] && x[1]) tab(x[0], x[1]);
    }
  }
}

function val(x){return x===0?0:(x||'')}
function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll("'",'&#39;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function jsonAttr(obj){ return esc(JSON.stringify(obj||{})); }
function categories(){ return DATA.categories || []; }
function visibleCategories(){ return canManageAssignmentDomains() ? categories() : categories().filter(c=>c.name!=='תחום שיוך'); }
function categoryNames(){ return visibleCategories().map(c=>c.name); }
function optionCategoryName(type){
  const aliases = {'תפקיד':'תפקיד / כובע','תפקיד / כובע':'תפקיד'};
  if(categories().some(c=>c.name===type)) return type;
  return aliases[type] || type;
}
function optionsForCategory(type, selected=''){
  const categoryName = optionCategoryName(type);
  const cat = categories().find(c=>c.name===categoryName);
  const arr = cat ? (cat.values||[]).filter(x=>x.active!=='לא') : [];
  let html = arr.map(x=>`<option value="${esc(x.value)}" ${x.value==selected?'selected':''}>${esc(x.value)}</option>`).join('');
  if(selected && !arr.some(x=>String(x.value)===String(selected))){
    html = `<option value="${esc(selected)}" selected>${esc(selected)}</option>` + html;
  }
  return html;
}
function opts(type, selected=''){
  return optionsForCategory(type, selected);
}
function canManageAssignmentDomains(){ const u=DATA.currentUser||{}; return u.isOwner===true || String(u.role||'').trim()==='מנהל ראשי'; }
function canEditAssignmentDomains(){ return canManageAssignmentDomains(); }
function assignmentDomainValue(r={}){ return r['תחום שיוך'] || 'ללא'; }
function assignmentDomainOptions(selected='ללא'){
  selected = selected || 'ללא';
  let html = optionsForCategory('תחום שיוך', selected);
  if(!html.includes('value="ללא"')) html = `<option value="ללא" ${selected==='ללא'?'selected':''}>ללא</option>` + html;
  return html;
}
function assignmentDomainsMulti(selected=''){
  const selectedSet = new Set(String(selected||'').split(/[;,|\n]+/).map(x=>x.trim()).filter(Boolean));
  const cat = categories().find(c=>c.name==='תחום שיוך');
  const arr = cat ? (cat.values||[]).filter(x=>x.active!=='לא' && String(x.value||'').trim()!=='ללא') : [];
  return arr.map(x=>`<option value="${esc(x.value)}" ${selectedSet.has(String(x.value))?'selected':''}>${esc(x.value)}</option>`).join('');
}
function selectedAssignmentDomains(){
  if(typeof cAssignmentDomains === 'undefined') return '';
  return Array.from(cAssignmentDomains.selectedOptions).map(o=>o.value).filter(Boolean).join(', ');
}
function selectedAdditionalAssignmentDomains(){
  if(typeof cAdditionalAssignmentDomains === 'undefined') return '';
  const central = typeof cCentralAssignmentDomain !== 'undefined' ? cCentralAssignmentDomain.value : '';
  return Array.from(cAdditionalAssignmentDomains.selectedOptions).map(o=>o.value).filter(v=>v && v !== 'ללא' && v !== central).join(', ');
}
function usersList(){ return ((DATA.realSettings||{}).users || []); }
function permissionOptions(selected=''){
  const arr=['ללא הרשאה','מנהל ראשי','מנהל','משתמש','לקוח'];
  return arr.map(x=>`<option value="${esc(x)}" ${x==selected?'selected':''}>${esc(x)}</option>`).join('');
}
function contactsWithPermission(){
  return (DATA.contacts||[]).filter(c => (c['הרשאת מערכת']||'ללא הרשאה') !== 'ללא הרשאה');
}
function contactNameById(id){
  const c=(DATA.contacts||[]).find(x=>x['מזהה איש קשר']===id);
  return c ? `${c['שם מלא']} (${c['הרשאת מערכת']||''})` : id;
}
function projectNameById(id){
  const p=(DATA.projects||[]).find(x=>x['מזהה פרויקט']===id);
  return p ? p['שם פרויקט'] : id;
}
function activeUsersOptions(selected=''){
  return `<option value="">בחר אחראי</option>` + usersList().filter(u=>u['פעיל']!=='לא').map(u=>`<option value="${esc(u['שם'])}" ${u['שם']==selected?'selected':''}>${esc(u['שם'])}</option>`).join('');
}
let projectResponsibleRequestSeq = 0;
function projectResponsibleSelection(candidates, desired='', storedOwner='', projectId=''){
  const rows = Array.isArray(candidates) ? candidates : [];
  const desiredValue = String(desired || '').trim();
  const storedValue = String(storedOwner || '').trim();
  const validDesired = rows.some(u => !u.legacy && u.name === desiredValue);
  if(validDesired) return desiredValue;
  if(projectId && storedValue && rows.some(u => u.legacy && u.name === storedValue)) return storedValue;
  return '';
}
function projectResponsibleOptions(candidates, selected='', storedOwner='', projectId=''){
  const rows = Array.isArray(candidates) ? candidates : [];
  const selectedValue = projectResponsibleSelection(rows, selected, storedOwner, projectId);
  return `<option value="">בחר אחראי</option>` + rows.map(u=>`<option value="${esc(u.name)}" ${u.name==selectedValue?'selected':''}>${esc(u.label || (u.name + (u.role ? ' (' + u.role + ')' : '')))}</option>`).join('');
}
function loadProjectResponsibleOptions(projectId, selected, storedOwner){
  if(typeof pOwner === 'undefined') return;
  const requestedDomain = (typeof pAssignmentDomain !== 'undefined' ? pAssignmentDomain.value : '');
  const requestSeq = ++projectResponsibleRequestSeq;
  const legacyOwner = storedOwner !== undefined ? storedOwner : (pOwner.dataset.storedOwner || selected || '');
  pOwner.disabled = true;
  pOwner.innerHTML = `<option value="">טוען אחראים...</option>`;
  google.script.run
    .withSuccessHandler(rows=>{
      if(requestSeq !== projectResponsibleRequestSeq) return;
      const currentDomain = (typeof pAssignmentDomain !== 'undefined' ? pAssignmentDomain.value : '');
      if(currentDomain !== requestedDomain) return;
      if(typeof pOwner !== 'undefined'){
        pOwner.innerHTML = projectResponsibleOptions(rows, selected || '', legacyOwner || '', projectId || '');
        pOwner.disabled = false;
      }
    })
    .withFailureHandler(e=>{
      if(requestSeq !== projectResponsibleRequestSeq) return;
      if(typeof pOwner !== 'undefined'){
        pOwner.innerHTML = `<option value="">לא נטען</option>`;
        pOwner.disabled = false;
      }
      alert(e.message);
    })
    .קבלת_מועמדי_אחראי_פרויקט({authToken:currentToken(), projectId:projectId || '', currentOwner:legacyOwner || '', assignmentDomain:requestedDomain});
}
function refreshProjectResponsibleOptions(projectId){
  const selected = (typeof pOwner !== 'undefined' ? pOwner.value : '');
  const storedOwner = (typeof pOwner !== 'undefined' ? (pOwner.dataset.storedOwner || '') : '');
  loadProjectResponsibleOptions(projectId || '', selected || storedOwner || '', storedOwner || '');
}
function filtered(rows, q, fields){
  q=(q||'').toLowerCase().trim();
  if(!q) return rows;
  return rows.filter(r=>fields.some(f=>String(r[f]||'').toLowerCase().includes(q)));
}
function smallTable(rows,keys,labels,actions){
  if(!rows||!rows.length)return'<p>אין נתונים להצגה.</p>';
  let h='<table><tr>'+labels.map(l=>`<th>${l}</th>`).join('')+(actions?'<th>פעולות</th>':'')+'</tr>';
  rows.forEach(r=>{h+='<tr>'+keys.map(k=>`<td>${val(r[k])}</td>`).join('')+(actions?`<td>${actions(r)}</td>`:'')+'</tr>'});
  return h+'</table>';
}
function tableHtml(rows, cols, rowClick, actions){
  if(!rows.length) return '<p>אין נתונים להצגה.</p>';

  tableHtml._uid = (tableHtml._uid || 0) + 1;
  const tableUid = 'rowMenu_' + tableHtml._uid + '_';

  let h = '<table><tr>' +
    cols.map(c=>`<th>${c.label}</th>`).join('') +
    (actions ? '<th style="width:55px;text-align:center">פעולות</th>' : '') +
    '</tr>';

  rows.forEach((r, i)=>{
    const click = rowClick ? ` onclick="${rowClick(r)}"` : '';
    const menuId = tableUid + i;

    h += `<tr class="${rowClick?'clickable-row':''}"${click}>` +
      cols.map(c=>`<td>${val(r[c.key])}</td>`).join('');

    if(actions){
      h += `
        <td onclick="event.stopPropagation()" style="text-align:center;position:relative">
          <button class="row-menu-dots" onclick="toggleRowMenu(event,'${menuId}')">⋮</button>
          <div id="${menuId}" class="row-menu hidden">
            ${actions(r)}
          </div>
        </td>`;
    }

    h += '</tr>';
  });

  return h + '</table>';
}

function closeAllRowMenus(){
  document.querySelectorAll('.row-menu-floating').forEach(m=>m.remove());
}

function toggleRowMenu(event, id){
  event.stopPropagation();

  const source = document.getElementById(id);
  if(!source) return;

  const wasOpen = document.querySelector('.row-menu-floating');
  closeAllRowMenus();
  if(wasOpen) return;

  const menu = document.createElement('div');
  menu.className = 'row-menu-floating';
  menu.innerHTML = source.innerHTML;
  document.body.appendChild(menu);

  const r = event.currentTarget.getBoundingClientRect();
  menu.style.position = 'fixed';
  menu.style.top = (r.bottom + 6) + 'px';
  menu.style.left = Math.max(10, r.left - 95) + 'px';
}

document.addEventListener('click', closeAllRowMenus);

/* Dashboard */
function renderDashboard(){
  const d = DATA.dashboard || {};
  const notice = DATA.accessNotice ? `<div class="card"><b>הודעת הרשאות:</b> ${esc(DATA.accessNotice)}</div>` : '';
  if (notice && typeof dashboard !== 'undefined') {
    const existing = document.getElementById('accessNoticeBox');
    if (!existing) {
      const box = document.createElement('div');
      box.id = 'accessNoticeBox';
      box.innerHTML = notice;
      dashboard.insertBefore(box, dashboard.children[1] || null);
    } else {
      existing.innerHTML = notice;
    }
  }
  lateBox.innerHTML = dashList(d.lateTasks, 'task');
  todayBox.innerHTML = dashList(d.todayTasks, 'task');
  weekBox.innerHTML = dashList(d.weekTasks, 'task');
  activeProjectsBox.innerHTML = dashList(d.activeProjects, 'project');
}
function dashList(rows,type){
  if(!rows || !rows.length) return '<p>אין נתונים.</p>';
  let html = `<b>${rows.length}</b><ul>`;
  rows.slice(0,6).forEach(r=>{
    if(type==='task') html += `<li><span class="linkish" onclick='openTask(${JSON.stringify(r)})'>${esc(r['כותרת'])}</span> <span class="muted">${esc(r['תאריך']||'')}</span></li>`;
    else html += `<li><span class="linkish" onclick='openProjectCard("${esc(r['מזהה פרויקט'])}")'>${esc(r['שם פרויקט'])}</span> <span class="muted">${esc(r['עיר']||'')}</span></li>`;
  });
  return html+'</ul>';
}

/* Projects */
function tableProjects(){
  const rows=filtered(DATA.projects||[], projectSearch?.value, canManageAssignmentDomains()?['שם פרויקט','עיר','תחום','סטטוס','תחום שיוך','תגיות','אחראי']:['שם פרויקט','עיר','תחום','סטטוס','תגיות','אחראי']);
  projectsTable.innerHTML=tableHtml(rows,[
    {key:'שם פרויקט',label:'שם פרויקט'},{key:'עיר',label:'עיר'},{key:'תחום',label:'תחום'},{key:'סטטוס',label:'סטטוס'}
  ], r=>`openProjectCard('${esc(r['מזהה פרויקט'])}')`, null);
}
function openProject(r={}){
  modalBox.className='box small';
  modalBox.innerHTML=`
    <h2>${r['מזהה פרויקט']?'עריכת פרויקט':'פרויקט חדש'}</h2>
    <label>שם פרויקט${BH_requiredMark('project','שם פרויקט')}</label><input id="pName" value="${esc(r['שם פרויקט'])}">

function openTask(r={}, preset={}){

  const allowedIds = preset.allowedContactIds || null;
  const isMeeting = (r['סוג משימה'] || 'משימה') === 'פגישה';
  const hasDate = !!r['תאריך'];
  const calendarValue = r['כניסה ליומן'] || (isMeeting ? 'כן' : 'לא');
  modalBox.className='box small';
  modalBox.innerHTML=`
    <h2>${r['מזהה משימה']?'עריכת משימה':'משימה חדשה'}</h2>

    <div id="taskTimeBlock" class="${hasDate?'':'hidden'}">
      <label>שעה</label><input id="tTime" type="time" value="${esc(r['שעה'])}">
      <div id="taskEndTimeBlock" class="${isMeeting && hasDate ? '' : 'hidden'}">
        <label>שעת סיום</label><input id="tEndTime" type="time" value="${esc(r['שעת סיום'])}">
      </div>
      <label>להכניס ליומן?</label>
      <select id="tCalendar">
        <option ${calendarValue!=='כן'?'selected':''}>לא</option>
        <option ${calendarValue==='כן'?'selected':''}>כן</option>
      </select>
    </div>
    <label>סטטוס</label><select id="tStatus">${opts('סטטוס משימה',r['סטטוס']||'פתוח')}</select>
    <label>פרויקט</label><select id="tProject">${projectOptions(r['מזהה פרויקט'])}</select>

function updateTaskFields(){
  if(typeof tDate === 'undefined' || typeof tType === 'undefined') return;
  const hasDate = !!tDate.value;
  const isMeeting = tType.value === 'פגישה';
  taskTimeBlock.classList.toggle('hidden', !hasDate);
  taskEndTimeBlock.classList.toggle('hidden', !(hasDate && isMeeting));
  if(hasDate && typeof tCalendar !== 'undefined'){
    if(isMeeting && !tCalendar.dataset.touched){ tCalendar.value = 'כן'; }
  }
  if(typeof tCalendar !== 'undefined'){
    tCalendar.onchange = () => { tCalendar.dataset.touched = '1'; };
  }
}

function saveTask(id){
  const hasDate = !!tDate.value;
  const isMeeting = tType.value === 'פגישה';
  if(hasDate && !tTime.value){ alert('כאשר מזינים תאריך, חובה להזין שעה'); return; }
  if(hasDate && isMeeting && !tEndTime.value){ alert('בפגישה חובה להזין שעת סיום'); return; }

  google.script.run.withSuccessHandler(()=>{closeM();refreshCore();})
    .withFailureHandler(e=>alert(e.message))
    .שמירת_משימה({
      id,
      title:tTitle.value,

      date:tDate.value,
      time:hasDate ? tTime.value : '',
      endTime:(hasDate && isMeeting) ? tEndTime.value : '',

      status:tStatus.value,
      projectId:tProject.value,
      contactId:tContact.value,

    });
}

let CAL_VIEW = 'week';
let CAL_DATE = new Date();

function parseDateOnly(s){
  if(!s) return null;
  const p = String(s).split('-').map(Number);
  if(p.length === 3 && p[0]) return new Date(p[0], p[1]-1, p[2]);
  const d = new Date(s); return isNaN(d) ? null : d;
}
function fmtDateISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateDMY(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function fmtWeekRange(s,e){ if(s.getMonth()===e.getMonth() && s.getFullYear()===e.getFullYear()) return String(s.getDate()).padStart(2,'0')+'-'+String(e.getDate()).padStart(2,'0')+'/'+String(e.getMonth()+1).padStart(2,'0')+'/'+e.getFullYear(); return String(s.getDate()).padStart(2,'0')+'/'+String(s.getMonth()+1).padStart(2,'0')+'-'+String(e.getDate()).padStart(2,'0')+'/'+String(e.getMonth()+1).padStart(2,'0')+'/'+e.getFullYear(); }
function updateCalendarViewButtons(){ ['day','week','month'].forEach(v=>{ const el=document.getElementById('cal'+v.charAt(0).toUpperCase()+v.slice(1)+'Btn'); if(el) el.classList.toggle('active-view', CAL_VIEW===v); }); }
function sameDate(a,b){ return a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function hebrewNumLetters(n){
  n = Number(n||0);
  const ones=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
  const tens=['','י','כ','ל','מ','נ','ס','ע','פ','צ'];
  if(n===15) return 'ט״ו';
  if(n===16) return 'ט״ז';
  if(n<10) return ones[n] ? ones[n] + "׳" : '';
  if(n===10 || n===20 || n===30) return tens[n/10] + "׳";
  const t=Math.floor(n/10), o=n%10;
  return (tens[t]||'') + '״' + (ones[o]||'');
}
function hebrewDate(d){
  try {
    const parts = new Intl.DateTimeFormat('he-u-ca-hebrew',{day:'numeric',month:'long'}).formatToParts(d);
    const day = parts.find(x=>x.type==='day')?.value || '';
    const month = parts.find(x=>x.type==='month')?.value || '';
    return `${hebrewNumLetters(day)} ${month}`.trim();
  } catch(e){ return ''; }
}
function dayName(d){ return new Intl.DateTimeFormat('he',{weekday:'short'}).format(d); }
function priorityClass(t){ return 'prio-' + String(t['עדיפות'] || 'רגילה').replace(/\s+/g,''); }
function priorityMark(p){ if(p==='דחופה') return '🔴 '; if(p==='גבוהה') return '🟠 '; if(p==='נמוכה') return '⚪ '; return '🟢 '; }
function calendarTasksForDate(d){ const iso=fmtDateISO(d); return (DATA.tasks||[]).filter(t=>t['תאריך']===iso).sort((a,b)=>String(a['שעה']||'').localeCompare(String(b['שעה']||''),'he')); }
function setCalendarView(v){ CAL_VIEW=v; renderCalendarDashboard(); }
function goCalendarToday(){ CAL_DATE=new Date(); renderCalendarDashboard(); }
function moveCalendar(dir){
  const d=new Date(CAL_DATE);
  if(CAL_VIEW==='day') d.setDate(d.getDate()+dir);
  else if(CAL_VIEW==='week') d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  CAL_DATE=d; renderCalendarDashboard();
}
function startOfWeek(d){ const x=new Date(d); const day=x.getDay(); x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function renderCalendarDashboard(){
  if(typeof calendarBox === 'undefined') return;
  updateCalendarViewButtons();
  let days=[]; const base=new Date(CAL_DATE); let gridClass='';
  if(CAL_VIEW==='day') {
    days=[base];
    calendarTitle.textContent=fmtDateDMY(base);
  }
  if(CAL_VIEW==='week') {
    const s=startOfWeek(base);
    for(let i=0;i<7;i++){const d=new Date(s);d.setDate(s.getDate()+i);days.push(d);}
    calendarTitle.textContent=fmtWeekRange(days[0], days[6]);
  }
  if(CAL_VIEW==='month') {
    const first=new Date(base.getFullYear(),base.getMonth(),1);
    const last=new Date(base.getFullYear(),base.getMonth()+1,0);
    for(let i=1;i<=last.getDate();i++){ days.push(new Date(base.getFullYear(),base.getMonth(),i)); }
    calendarTitle.textContent=new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(base);
    gridClass=' month-only';
  }
  const today=new Date(); today.setHours(0,0,0,0);
  calendarBox.innerHTML = `<div class="calendar-grid${gridClass}">` + days.map(d=>{
    const tasks=calendarTasksForDate(d);
    return `<div class="calendar-day ${sameDate(d,today)?'today':''}">
      <div class="calendar-day-head">${dayName(d)} · ${fmtDateDMY(d)}</div>
      <div class="calendar-hebrew">${hebrewDate(d)}</div>
      ${tasks.map(t=>`<span class="calendar-event ${priorityClass(t)}" onclick="openTaskCard('${esc(t['מזהה משימה'])}')">${esc(t['שעה']||'')} ${priorityMark(t['עדיפות'])}${esc(t['סוג משימה']||'משימה')} - ${esc(t['כותרת']||'')}</span>`).join('')}
    </div>`;
  }).join('') + `</div>`;
}

function sortRows(rows, mode, nameField){
  rows = rows.slice();
  if(mode==='nameAsc') rows.sort((a,b)=>String(a[nameField]||'').localeCompare(String(b[nameField]||''),'he'));
  else if(mode==='nameDesc') rows.sort((a,b)=>String(b[nameField]||'').localeCompare(String(a[nameField]||''),'he'));
  else if(mode==='dateAsc') rows.sort((a,b)=>String(a['תאריך יצירה']||'').localeCompare(String(b['תאריך יצירה']||'')));
  else rows.sort((a,b)=>String(b['תאריך יצירה']||'').localeCompare(String(a['תאריך יצירה']||'')));
  return rows;

function participantCandidatesForTask(r={}){
  const out=[]; const seen={};
  function add(label,email){ email=String(email||'').trim(); if(!email || !email.includes('@') || seen[email.toLowerCase()]) return; seen[email.toLowerCase()]=true; out.push({label,email}); }
  const project=(DATA.projects||[]).find(p=>p['מזהה פרויקט']===r['מזהה פרויקט'])||{};
  const taskContact=(DATA.contacts||[]).find(c=>c['מזהה איש קשר']===r['מזהה איש קשר'])||{};
  if(taskContact['אימייל']) add('איש קשר: '+(taskContact['שם מלא']||''), taskContact['אימייל']);
  const taskOwnerName=r['אחראי']||'';
  const projectOwnerName=project['אחראי']||'';
  (DATA.contacts||[]).forEach(c=>{
    if(taskOwnerName && c['שם מלא']===taskOwnerName) add('אחראי משימה: '+taskOwnerName, c['אימייל']);
    if(projectOwnerName && c['שם מלא']===projectOwnerName) add('אחראי פרויקט: '+projectOwnerName, c['אימייל']);
  });
  (usersList()||[]).forEach(u=>{
    if(taskOwnerName && u['שם']===taskOwnerName) add('אחראי משימה: '+taskOwnerName, u['מייל']);
    if(projectOwnerName && u['שם']===projectOwnerName) add('אחראי פרויקט: '+projectOwnerName, u['מייל']);
  });
  const projectId=r['מזהה פרויקט'];
  if(projectId){
    (DATA.links||[]).filter(l=>l['מזהה פרויקט']===projectId).forEach(l=>{
      const c=(DATA.contacts||[]).find(x=>x['מזהה איש קשר']===l['מזהה איש קשר']);
      if(c && c['אימייל']) add('משויך לפרויקט: '+(c['שם מלא']||''), c['אימייל']);
    });
  }
  return out;
}

function hebrewNumberLetters(n){
  n = Number(n || 0);
  const ones={1:'א',2:'ב',3:'ג',4:'ד',5:'ה',6:'ו',7:'ז',8:'ח',9:'ט'};
  const tens={10:'י',20:'כ',30:'ל'};
  if(n===15) return 'ט״ו';
  if(n===16) return 'ט״ז';
  if(n<=10) return n===10 ? 'י׳' : (ones[n] ? ones[n]+'׳' : '');
  if(n<20) return 'י״'+ones[n-10];
  if(n===20) return 'כ׳';
  if(n<30) return 'כ״'+ones[n-20];
  if(n===30) return 'ל׳';
  return String(n);
}
function hebrewDate(d){
  try {
    const parts = new Intl.DateTimeFormat('he-u-ca-hebrew',{day:'numeric',month:'long'}).formatToParts(d);
    const day = Number((parts.find(p=>p.type==='day')||{}).value || 0);
    let month = String((parts.find(p=>p.type==='month')||{}).value || '').replace(/^ב/,'');
    return `${hebrewNumberLetters(day)} ${month}`.trim();
  } catch(e){ return ''; }
}
function shortDateTitle(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function weekTitleText(a,b){
  const dd=x=>String(x.getDate()).padStart(2,'0');
  const mm=x=>String(x.getMonth()+1).padStart(2,'0');
  if(a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear()) return `${dd(a)}–${dd(b)}/${mm(b)}/${b.getFullYear()}`;
  return `${dd(a)}/${mm(a)}–${dd(b)}/${mm(b)}/${b.getFullYear()}`;
}

  if(typeof calendarBox === 'undefined') return;
  let days=[]; const base=new Date(CAL_DATE);
  if(CAL_VIEW==='day') { days=[base]; calendarTitle.textContent=shortDateTitle(base); }

  let leadingBlanks=0;

function tableTasks(){
  if(window.taskProjectFilter){
    const current = taskProjectFilter.value || '';

    const options = ['<option value="">כל הפרויקטים</option>']
      .concat((DATA.projects || [])
        .filter(p => String(p['בארכיון'] || '') !== 'כן')
        .map(p => `<option value="${esc(p['מזהה פרויקט'])}">${esc(p['שם פרויקט'] || '')}</option>`));

    taskProjectFilter.innerHTML = options.join('');
    taskProjectFilter.value = current;
  }

  const projectsById = {};
  (DATA.projects || []).forEach(p=>{
    projectsById[String(p['מזהה פרויקט'] || '')] = p['שם פרויקט'] || '';
  });

  let rows = (DATA.tasks || []).filter(r => String(r['בארכיון'] || '') !== 'כן');

  const selectedProject = window.taskProjectFilter ? taskProjectFilter.value : '';
  if(selectedProject){
    rows = rows.filter(t => String(t['מזהה פרויקט'] || '') === String(selectedProject));
  }

  const f = taskFilter?.value || 'all';
  const today = new Date(); today.setHours(0,0,0,0);
  const week = new Date(today); week.setDate(week.getDate()+7);

  rows = rows.filter(t=>{
    const d = t['תאריך'] ? parseDateOnly(t['תאריך']) : null;
    if(f==='open') return t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל';
    if(f==='done') return t['סטטוס']==='בוצע';
    if(f==='late') return d && d<today && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל';
    if(f==='today') return d && d.getTime()===today.getTime() && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל';
    if(f==='week') return d && d>today && d<=week && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל';
    return true;
  });

  rows = rows.map(t=>{
    const copy = Object.assign({}, t);
    const note = esc(t['הערות למשימה'] || '');
    copy['כותרת'] = `<span class="task-title-note" title="${note}">${esc(t['כותרת'] || '')}</span>`;
    copy['משויך לפרויקט'] = projectsById[String(t['מזהה פרויקט'] || '')] || '';
    return copy;
  });

  tasksTable.innerHTML = tableHtml(rows,[
    {key:'כותרת',label:'כותרת'},
    {key:'משויך לפרויקט',label:'משויך לפרויקט'},
    {key:'סוג משימה',label:'סוג'},
    {key:'עדיפות',label:'עדיפות'},
    {key:'תאריך',label:'תאריך'},
    {key:'שעה',label:'שעה'},
    {key:'סטטוס',label:'סטטוס'}
  ], r=>`openTaskCard('${esc(r['מזהה משימה'])}')`, r=>{
    const id = esc(r['מזהה משימה']);
    const isDone = r['סטטוס'] === 'בוצע';

    return `
      <button onclick="openTaskCard('${id}')">ערוך</button>
      ${isDone
        ? `<button onclick="reactivateTask('${id}')">החזר לפעיל</button>`
        : `<button onclick="doneTask('${id}')">בוצע</button>`
      }
      <button class="danger" onclick="delTask('${id}')">העבר לארכיון</button>
    `;
  });
}

  return map[String(role||'ללא הרשאה').trim()] || 0;
}
function currentRole(){ return String((DATA.currentUser||{}).role||'').trim(); }
function actionPerms(){ return DATA.actionPermissions || {}; }
function canCreate(){ const p=actionPerms(); return p.canCreate !== false && p.readOnly !== true; }

  if(canSeeDashboard()) return ['dashboard', document.getElementById('btn_dashboard')];

  return ['contacts', document.getElementById('btn_contacts')];

function secureTab(id,b){
  if(id==='dashboard' && !canSeeDashboard()) { const x=firstVisibleTab(); return tab(x[0],x[1]); }
  if(id==='settings' && !canSeeSettings()) { alert('אין לך הרשאה להגדרות'); const x=firstVisibleTab(); return tab(x[0],x[1]); }
  return tab(id,b);

btn_dashboard.onclick=function(){secureTab('dashboard',this)};

function applySecurityUI(){
  const u = DATA.currentUser || {};
  const role = String(u.role || '').trim();

  const isSuperAdmin = u.isOwner === true || role === 'מנהל ראשי';
  const isClient = role === 'לקוח';
  const canWrite = !isClient && !!role;

  DATA.canSeeSettings = DATA.canSeeSettings === true || isSuperAdmin;

  const settingsBtn = document.getElementById('btn_settings');
  if(settingsBtn){
    settingsBtn.style.display = DATA.canSeeSettings ? '' : 'none';
    settingsBtn.style.visibility = DATA.canSeeSettings ? '' : 'hidden';
    settingsBtn.style.pointerEvents = DATA.canSeeSettings ? '' : 'none';
  }

  const archiveBtn = document.getElementById('btn_archive');
  if(archiveBtn){
    archiveBtn.style.display = canSeeArchive() ? '' : 'none';
    archiveBtn.style.visibility = canSeeArchive() ? '' : 'hidden';
    archiveBtn.style.pointerEvents = canSeeArchive() ? '' : 'none';
  }

  const modules = (DATA.actionPermissions && DATA.actionPermissions.modules) || {};
  [['btn_dashboard','dashboard'],['btn_projects','projects'],['btn_contacts','contacts'],['btn_tasks','tasks']].forEach(function(pair){
    const el = document.getElementById(pair[0]);
    if(!el) return;
    const allowed = modules[pair[1]] !== false && (pair[1] !== 'dashboard' || canSeeDashboard());
    el.style.display = allowed ? '' : 'none';
    el.style.visibility = allowed ? '' : 'hidden';
    el.style.pointerEvents = allowed ? '' : 'none';
  });

  const settingsSection = document.getElementById('settings');
  if(settingsSection && !DATA.canSeeSettings){
    settingsSection.classList.add('hidden');
  }

  const archiveSection = document.getElementById('archive');
  if(archiveSection && !canSeeArchive()){
    archiveSection.classList.add('hidden');
  }

  document.querySelectorAll('button').forEach(btn=>{
    const onclick = String(btn.getAttribute('onclick') || '').replace(/\s/g,'');

    const isMainAddButton =
      onclick === 'openProject()' ||
      onclick === 'openContact()' ||
      onclick === 'openTask()';

    if(isMainAddButton){
      btn.style.display = canWrite ? 'inline-block' : 'none';
      btn.style.visibility = canWrite ? 'visible' : 'hidden';
      btn.style.pointerEvents = canWrite ? 'auto' : 'none';
    }
  });
}

  }
};

 * Build 11.4 – תצוגת כרטיסים לפי הרשאות בלי חשיפת מאגרים
 ***********************/
function linkActionsForProject(l, projectId){
  if(!canEdit()) return '';
  return `<button onclick="openLinkPermissionEditor('${l.linkId}','${projectId}','project')">ערוך הרשאה</button> ${canDelete()?`<button class="danger" onclick="deleteLink('${l.linkId}',()=>openProjectCard('${projectId}'))">הסר</button>`:''}`;
}
function linkActionsForContact(l, contactId){
  const openBtn = `<button onclick="openProjectCard('${l.projectId}')">פתח פרויקט</button>`;
  if(!canEdit()) return openBtn;
  return `${openBtn} <button onclick="openLinkPermissionEditor('${l.linkId}','${contactId}','contact')">ערוך הרשאה</button> ${canDelete()?`<button class="danger" onclick="deleteLink('${l.linkId}',()=>openContactCard('${contactId}'))">הסר</button>`:''}`;
}

renderProjectCard = function(d){

  const role = String((DATA.currentUser || {}).role || '').trim();
const canWriteProject = !isArchived && canEdit();

const readOnly = isArchived || !canWriteProject;

  const archiveNotice = isArchived
    ? `<div class="card" style="border:1px solid #f59e0b;background:#fffbeb">

  modalBox.innerHTML=`
    <h2>${esc(p['שם פרויקט'])}</h2>
    ${archiveNotice}
    <div class="toolbar">
      ${!readOnly ? `<button class="primary" onclick='openProject(${JSON.stringify(p)})'>ערוך</button>` : ''}
      ${!readOnly && canDelete() ? `<button class="danger" onclick='delProject("${esc(p['מזהה פרויקט'])}")'>העבר לארכיון</button>` : ''}
      <button onclick="closeM()">סגור</button>
    </div>
    <div class="grid2">
      <div><b>עיר:</b> ${val(p['עיר'])}</div><div><b>תחום:</b> ${val(p['תחום'])}</div>
      <div><b>סטטוס:</b> ${val(p['סטטוס'])}</div>${canManageAssignmentDomains()?`<div><b>תחום שיוך:</b> ${val(assignmentDomainValue(p))}</div>`:''}<div><b>אחראי:</b> ${val(p['אחראי'])}</div>
    </div>
    <h3 class="sectionTitle">אנשי קשר משויכים</h3>
    ${smallTable(d.links,['name','phone','type','role','portal'],['שם','טלפון','סוג','תפקיד','הרשאת צפייה'],l=>readOnly ? '' : linkActionsForProject(l,p['מזהה פרויקט']))}
    ${!readOnly ? `
      <button class="primary" onclick="document.getElementById('addProjectContactBox').classList.toggle('hidden')">+ הוסף איש קשר לפרויקט</button>
      <div id="addProjectContactBox" class="hidden card">
        <label>איש קשר</label>
        <select id="linkContact"><option value="">ללא</option>${(d.allContacts||[]).map(c=>`<option value="${esc(c['מזהה איש קשר'])}">${esc(c['שם מלא'])} ${c['הרשאת מערכת']&&c['הרשאת מערכת']!=='ללא הרשאה'?' - '+esc(c['הרשאת מערכת']):''}</option>`).join('')}</select>
        <label>תפקיד בפרויקט</label>
        <select id="linkRole">${opts('תפקיד')}</select>
        <label>הרשאת צפייה בפרויקט</label>
        <select id="linkPortal"><option>לא</option><option>כן</option></select>
        <button class="primary" onclick="saveLink('${esc(p['מזהה פרויקט'])}',linkContact.value,linkRole.value,linkPortal.value,()=>openProjectCard('${esc(p['מזהה פרויקט'])}'))">הוסף שיוך</button>
      </div>` : ''}
    <h3 class="sectionTitle">משימות הפרויקט</h3>
    ${!readOnly ? `<button onclick='openTask({}, {"מזהה פרויקט":"${esc(p['מזהה פרויקט'])}","allowedContactIds":${JSON.stringify(d.allowedContactIds||[])}})'>+ משימה לפרויקט</button>` : ''}
    ${smallTable(d.tasks,['כותרת','תאריך','שעה','סטטוס'],['כותרת','תאריך','שעה','סטטוס'],t=>`<button onclick="openTaskCard('${esc(t['מזהה משימה'])}')">פתח</button>`)}
    <h3 class="sectionTitle">הערות</h3>
    ${!readOnly ? `<button class="primary" onclick="openProjectNote('${esc(p['מזהה פרויקט'])}')">+ הוסף הערה</button>` : ''}
    <div id="projectNotesBox">טוען...</div>
    ${canSeeTimelineButton() ? `
  <h3 class="sectionTitle">ציר זמן</h3>
  <button class="primary" onclick="openEntityTimeline('פרויקט','${esc(p['מזהה פרויקט'])}','openProjectCard(\\'${esc(p['מזהה פרויקט'])}\\')')">פתח ציר זמן</button>
` : ''}

  modal.classList.remove('hidden');

};

      ${!readOnly ? `<button class="primary" onclick='openContact(${JSON.stringify(c)})'>ערוך</button>` : ''}
      ${!readOnly && canDelete() ? `<button class="danger" onclick='delContact("${esc(c['מזהה איש קשר'])}")'>העבר לארכיון</button>` : ''}

    </div>
    <div class="grid2">
      <div><b>טלפון:</b> ${val(c['טלפון'])}</div><div><b>אימייל:</b> ${val(c['אימייל'])}</div>
      <div><b>סוג:</b> ${val(c['סוג איש קשר'])}</div><div><b>סטטוס:</b> ${val(c['סטטוס לקוח'])}</div>
      <div><b>הרשאת מערכת:</b> ${val(c['הרשאת מערכת']||'ללא הרשאה')}</div>
    </div>
    <h3 class="sectionTitle">פרויקטים משויכים</h3>
    ${smallTable(d.links,['name','city','status','role','portal'],['פרויקט','עיר','סטטוס','תפקיד','הרשאת צפייה'],l=>readOnly ? '' : linkActionsForContact(l,c['מזהה איש קשר']))}

    ${smallTable(d.tasks,['כותרת','תאריך','שעה','סטטוס'],['כותרת','תאריך','שעה','סטטוס'],t=>`<button onclick="openTaskCard('${esc(t['מזהה משימה'])}')">פתח</button>`)}
  `;
  modal.classList.remove('hidden');
};
</script>


<script>
/***********************
 * Build 12 – Modern UI + home + idle logout
 ***********************/
(function(){
  const IDLE_LIMIT_MS = 60 * 60 * 1000;
  const IDLE_WARNING_MS = 55 * 60 * 1000;
  let idleTimer = null;
  let idleWarnTimer = null;
  let idleWarned = false;

  const navLabels = {
    btn_dashboard:'🏠 דשבורד',
    btn_projects:'📁 פרויקטים',
    btn_contacts:'👤 אנשי קשר',
    btn_tasks:'✓ משימות',
    btn_settings:'⚙ הגדרות'
  };

  function decorateNav(){
    Object.keys(navLabels).forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.textContent = navLabels[id];
    });
  }

  function goDefaultHome(){
    try{
      const target = (typeof canSeeDashboard === 'function' && canSeeDashboard())
        ? ['dashboard', document.getElementById('btn_dashboard')]
        : (typeof firstVisibleTab === 'function' ? firstVisibleTab() : ['projects', document.getElementById('btn_projects')]);
      if(target && target[0] && target[1]) tab(target[0], target[1]);
    }catch(e){}
  }

  function forceLogoutByIdle(){
    const token = currentToken && currentToken();
    if(token){
      try{ google.script.run.התנתקות_Build7(token); }catch(e){}
    }
    if(typeof clearToken === 'function') clearToken();
    if(typeof closeM === 'function') closeM();
    if(typeof showLogin === 'function') showLogin('נותקת מהמערכת עקב חוסר פעילות. יש להתחבר מחדש.');
  }

  function warnIdle(){
    if(!currentToken || !currentToken()) return;
    idleWarned = true;
    const stay = confirm('המערכת תתנתק בעוד 5 דקות עקב חוסר פעילות. להמשיך לעבוד?');
    if(stay) resetIdleTimer();
  }

  function resetIdleTimer(){
    idleWarned = false;
    clearTimeout(idleTimer);
    clearTimeout(idleWarnTimer);
    if(!currentToken || !currentToken()) return;
    idleWarnTimer = setTimeout(warnIdle, IDLE_WARNING_MS);
    idleTimer = setTimeout(forceLogoutByIdle, IDLE_LIMIT_MS);
  }

  ['click','keydown','mousemove','touchstart','scroll'].forEach(ev=>{
    window.addEventListener(ev, resetIdleTimer, {passive:true});
  });

  const oldVerifyLoginCode = window.verifyLoginCode;
  window.verifyLoginCode = function(){
    sessionStorage.setItem('CRM_GO_HOME_AFTER_LOGIN','1');
    return oldVerifyLoginCode.apply(this, arguments);
  };

  function renderModernKpis(){
    const dashboardEl = document.getElementById('dashboard');
    if(!dashboardEl || !(DATA && DATA.dashboard)) return;
    let box = document.getElementById('modernKpis');
    const cards = dashboardEl.querySelector('.cards');
    if(!box){
      box = document.createElement('div');
      box.id = 'modernKpis';
      dashboardEl.insertBefore(box, cards || dashboardEl.children[1] || null);
    }
    const d = DATA.dashboard || {};
    const openTasks = (DATA.tasks||[]).filter(t=>!['בוצע','בוטל'].includes(t['סטטוס']||'')).length;
    const items = [
      ['📁','פרויקטים', d.projectsCount || (DATA.projects||[]).length || 0, 'פרויקטים פעילים'],
      ['⏰','באיחור', (d.lateTasks||[]).length || 0, 'משימות באיחור'],
      ['✓','משימות פתוחות', openTasks, `משימות לשבוע הקרוב: ${(d.weekTasks||[]).length || 0}`],
      ['👤','אנשי קשר', d.contactsCount || (DATA.contacts||[]).length || 0, `משימות להיום: ${(d.todayTasks||[]).length || 0}`]
    ];
    box.innerHTML = items.map(([icon,label,value,sub])=>`
      <div class="kpi-card"><span class="kpi-icon">${icon}</span><div><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div></div><div class="kpi-sub">${sub}</div></div>
    `).join('');
  }

  const oldLogout = window.logout;
  window.logout = function(){
    clearTimeout(idleTimer);
    clearTimeout(idleWarnTimer);
    return oldLogout.apply(this, arguments);
  };

  decorateNav();
})();


/* Build 12.2 – final UI behavior polish */
(function(){
  function applyUserHeaderPolish(){
    try{
      const u = (window.DATA && DATA.currentUser) || {};
      const name = u.name || u.email || '';
      const role = u.role || '';
      if(window.userGreeting){
        userGreeting.innerHTML = `<span>${greetingByHour()}, ${esc(name)}</span>${role ? `<span class="user-role-badge">${esc(role)}</span>` : ''}`;
      }
    }catch(e){}
  }
    const prevUpdate = window.updateCalendarViewButtons;
  window.updateCalendarViewButtons = function(){
    try{ if(prevUpdate) prevUpdate.apply(this, arguments); }catch(e){}
    ['day','week','month'].forEach(v=>{
      const el=document.getElementById('cal'+v.charAt(0).toUpperCase()+v.slice(1)+'Btn');
      if(el){
        el.classList.toggle('active-view', window.CAL_VIEW===v || CAL_VIEW===v);
      }
    });
  };
})();
</script>


<script>
/***********************
 * Build 13.2 – Lazy Load client override
 ***********************/
let __BH_LOADED_MODULES__ = {};
let __BH_LOADING_MODULE__ = {};

function activeSectionId_Build13_2(){
  const sec = Array.from(document.querySelectorAll('main section')).find(s=>!s.classList.contains('hidden'));
  return sec ? sec.id : 'dashboard';
}

function mergeData_Build13_2(d){
  d = d || {};
  DATA = DATA || {};

  Object.keys(d).forEach(function(k){
    if(k === 'realSettings') return;
    if(k === 'loadedModules') return;

    if(d[k] !== undefined && d[k] !== null){
      DATA[k] = d[k];
    }
  });

  if(d.realSettings){
    DATA.realSettings = Object.assign(DATA.realSettings || {}, d.realSettings || {});
  }

  if(d.loadedModules){
    Object.keys(d.loadedModules || {}).forEach(function(moduleName){
      if(d.loadedModules[moduleName] === true && hasRealModuleData_Build13_2(moduleName, d)){
        __BH_LOADED_MODULES__[moduleName] = true;
      }
    });
  }

  if(DATA.currentUser){
    try{
      localStorage.setItem('CRM_USER_INFO', JSON.stringify(DATA.currentUser));
    }catch(e){}
  }

  DATA.canSeeSettings =
    DATA.canSeeSettings === true ||
    (DATA.currentUser && DATA.currentUser.isOwner === true) ||
    String((DATA.currentUser && DATA.currentUser.role) || '').trim() === 'מנהל ראשי';
}

function hasRealModuleData_Build13_2(moduleName, d){
  d = d || {};
  if(moduleName === 'dashboard'){
    return !!(d.dashboard && Object.keys(d.dashboard).length);
  }
  if(moduleName === 'settings'){
    return !!(
      (d.realSettings && Object.keys(d.realSettings).length) ||
      (Array.isArray(d.fields) && d.fields.length) ||
      (d.permissions && Object.keys(d.permissions).length)
    );
  }
  if(moduleName === 'archive'){
    return Array.isArray(d.archive) || Array.isArray(d.archiveProjects) || Array.isArray(d.projects);
  }
  const value = d[moduleName];
  return Array.isArray(value) ? value.length > 0 : value !== undefined && value !== null;
}

function markLoadedModulesFromFullCore_Build13_2(d){
  d = d || {};
  ['dashboard','projects','contacts','tasks'].forEach(function(moduleName){
    if(Object.prototype.hasOwnProperty.call(d, moduleName)){
      __BH_LOADED_MODULES__[moduleName] = true;
    }
  });
  if(
    Object.prototype.hasOwnProperty.call(d, 'realSettings') ||
    Object.prototype.hasOwnProperty.call(d, 'fields') ||
    Object.prototype.hasOwnProperty.call(d, 'permissions')
  ){
    __BH_LOADED_MODULES__.settings = true;
  }
  if(hasRealModuleData_Build13_2('archive', d)){
    __BH_LOADED_MODULES__.archive = true;
  }
}

function renderShell_Build13_2(d){
  mergeData_Build13_2(d);

  const sys = DATA.system || {};
  document.documentElement.style.setProperty('--primary', sys.primaryColor || '#1f4e79');
  document.documentElement.style.setProperty('--secondary', sys.secondaryColor || '#e8eef5');

  if(typeof systemNameText !== 'undefined'){
    systemNameText.textContent = sys.name || 'CRM סרם נדל״ן';
  }

  const logoUrl = normalizeLogoUrl(sys.logo || '');

  if(typeof systemLogoImg !== 'undefined'){
    systemLogoImg.style.display = 'none';
    systemLogoImg.removeAttribute('src');
  }

  if(typeof sideLogoImg !== 'undefined'){
    if(logoUrl){
      sideLogoImg.src = logoUrl;
      sideLogoImg.style.display = 'block';
      sideLogoImg.style.maxHeight = normalizePx(sys.logoHeight || '68');
      if(typeof sideLogoFallback !== 'undefined') sideLogoFallback.style.display = 'none';
    } else {
      sideLogoImg.style.display = 'none';
      sideLogoImg.removeAttribute('src');
      if(typeof sideLogoFallback !== 'undefined') sideLogoFallback.style.display = 'inline';
    }
  }

  const u = DATA.currentUser || {};
  if(typeof userGreeting !== 'undefined'){
    userGreeting.innerHTML =
      `<span>${greetingByHour()}, ${esc(u.name || u.email || '')}</span>` +
      `${u.role ? `<span class="user-role-badge">${esc(u.role)}</span>` : ''}`;
  }

  if(typeof userArea !== 'undefined'){
    userArea.classList.remove('hidden');
  }

  DATA.canSeeSettings = DATA.canSeeSettings === true || u.isOwner === true || String(u.role || '').trim() === 'מנהל ראשי';

  if(typeof btn_settings !== 'undefined'){
    btn_settings.style.display = DATA.canSeeSettings ? '' : 'none';
  }
  if(typeof btn_archive !== 'undefined'){
    btn_archive.style.display = (typeof canSeeArchive === 'function' && canSeeArchive()) ? '' : 'none';
  }

  try{ renderDashboard(); }catch(e){ console.log(e); }
  try{ if(typeof renderModernKpis === 'function') renderModernKpis(); }catch(e){}
  try{ applySecurityUI(); }catch(e){}
}

window.__BH_CORE_LOAD_WAITERS__ = window.__BH_CORE_LOAD_WAITERS__ || [];
function load(forceDashboard=true, after){
  if(window.__BH_CORE_LOADING__){
    if(typeof after === 'function') window.__BH_CORE_LOAD_WAITERS__.push(after);
    return;
  }
  window.__BH_CORE_LOADING__ = true;
  const token = currentToken();

  if(!token){
    window.__BH_CORE_LOADING__ = false;
    window.__BH_CORE_LOAD_WAITERS__ = [];
    showLogin();
    return;
  }

  google.script.run
    .withSuccessHandler(d=>{
      window.__BH_CORE_LOADING__ = false;
      if(window.BH_isCustomerDomainSelectionRequired && window.BH_isCustomerDomainSelectionRequired(d)){ window.__BH_CORE_LOAD_WAITERS__ = []; window.BH_showCustomerDomainDialog(d); return; }
      if(!d || !d.auth || d.auth.allowed !== true){
        window.__BH_CORE_LOAD_WAITERS__ = [];
        clearToken();
        showLogin((d && d.auth && d.auth.reason) ? d.auth.reason : 'אין הרשאה או שהחיבור פג');
        return;
      }

      DATA = d || {};
      window.DATA = DATA;
      markLoadedModulesFromFullCore_Build13_2(d);

      hideLogin();
      render(DATA);

      if(forceDashboard){
        const btn = document.getElementById('btn_dashboard');
        if(btn) tab('dashboard', btn);
      }

      if(typeof renderCalendarDashboard === 'function'){
        renderCalendarDashboard();
      }

      if(typeof updateCalendarViewButtons === 'function'){
        updateCalendarViewButtons();
      }

      const loadWaiters = (typeof after === 'function' ? [after] : []).concat(window.__BH_CORE_LOAD_WAITERS__ || []);
      window.__BH_CORE_LOAD_WAITERS__ = [];
      loadWaiters.forEach(cb=>{ try{ cb(); }catch(err){ console.log(err); } });
    })
    .withFailureHandler(e=>{
      window.__BH_CORE_LOADING__ = false;
      clearToken();
      window.__BH_CORE_LOAD_WAITERS__ = [];
      showLogin('שגיאה בטעינה: ' + e.message);
    })
    .קבלת_נתוני_ליבה_Build13(token);
}

function firstAllowedTab_Build13_2(){
  if(typeof btn_projects !== 'undefined' && btn_projects.style.display !== 'none') return 'projects';
  if(typeof btn_contacts !== 'undefined' && btn_contacts.style.display !== 'none') return 'contacts';
  if(typeof btn_tasks !== 'undefined' && btn_tasks.style.display !== 'none') return 'tasks';
  if(typeof btn_settings !== 'undefined' && btn_settings.style.display !== 'none') return 'settings';
  return 'dashboard';
}

function openTabById_Build13_2(id){
  const btn = document.getElementById('btn_'+id);
  if(btn) tab(id, btn);
}

function tab(id,b){
  document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  if(b) b.classList.add('active');
  ensureModule_Build13_2(id);
}

function ensureModule_Build13_2(id){
  if(id==='dashboard') { try{ renderDashboard(); }catch(e){} return; }
  const module = id;
  if(__BH_LOADED_MODULES__[module]){
    renderModule_Build13_2(module);
    return;
  }
  loadModule_Build13_2(module);
}


function showModuleLoading_Build13_4(module){
  const map = {projects:'projectsTable', contacts:'contactsTable', tasks:'tasksTable', settings:'settingsBox', archive:'archiveBox'};
  const el = document.getElementById(map[module] || (module + 'Table'));
  if(el) el.innerHTML = '<div class="card module-loading">טוען נתונים...</div>';
}
function hideModuleLoading_Build13_4(module){
  const el = document.querySelector('#' + module + ' .module-loading');
  if(el) el.remove();
}
function loadModule_Build13_2(module, after){
  window.__BH_MODULE_WAITERS__ = window.__BH_MODULE_WAITERS__ || {};
  window.__BH_MODULE_WAITERS__[module] = window.__BH_MODULE_WAITERS__[module] || [];
  const token = currentToken();

  if(!token){
    __BH_LOADING_MODULE__[module] = false;
    hideModuleLoading_Build13_4(module);
    window.__BH_MODULE_WAITERS__[module] = [];
    showLogin();
    return;
  }

  if(__BH_LOADING_MODULE__[module]){
    if(typeof after === 'function') window.__BH_MODULE_WAITERS__[module].push(after);
    return;
  }
  if(typeof after === 'function') window.__BH_MODULE_WAITERS__[module].push(after);

  __BH_LOADING_MODULE__[module] = true;
  showModuleLoading_Build13_4(module);

  google.script.run
    .withSuccessHandler(d=>{
      __BH_LOADING_MODULE__[module] = false;
      hideModuleLoading_Build13_4(module);

      if(window.BH_isCustomerDomainSelectionRequired && window.BH_isCustomerDomainSelectionRequired(d)){
        window.__BH_MODULE_WAITERS__[module] = [];
        window.BH_showCustomerDomainDialog(d);
        return;
      }
      if(!d || !d.auth || d.auth.allowed !== true){
        window.__BH_MODULE_WAITERS__[module] = [];
        clearToken();
        showLogin((d && d.auth && d.auth.reason) ? d.auth.reason : 'אין הרשאה או שהחיבור פג');
        return;
      }

      mergeData_Build13_2(d);
      renderShell_Build13_2(d);

      tableProjects();
      tableContacts();
      tableTasks();

      if(DATA.canSeeSettings){
        renderSettings();
      }

function refreshCore(after){
  window.__BH_CORE_REFRESH_WAITERS__ = window.__BH_CORE_REFRESH_WAITERS__ || [];

  if(window.__BH_CORE_REFRESHING__){
    if(typeof after === 'function') window.__BH_CORE_REFRESH_WAITERS__.push(after);
    return;
  }

  window.__BH_CORE_REFRESHING__ = true;
  const primaryAfter = (typeof after === 'function') ? after : null;
  const token = currentToken();

  if(!token){
    window.__BH_CORE_REFRESHING__ = false;
    window.__BH_CORE_REFRESH_WAITERS__ = [];
    showLogin();
    return;
  }

  google.script.run
    .withSuccessHandler(d=>{
      if(window.BH_isCustomerDomainSelectionRequired && window.BH_isCustomerDomainSelectionRequired(d)){
        window.__BH_CORE_REFRESHING__ = false;
        window.__BH_CORE_REFRESH_WAITERS__ = [];
        window.BH_showCustomerDomainDialog(d);
        return;
      }
      if(!d || !d.auth || d.auth.allowed !== true){
        window.__BH_CORE_REFRESHING__ = false;
        window.__BH_CORE_REFRESH_WAITERS__ = [];
        clearToken();
        showLogin((d && d.auth && d.auth.reason) ? d.auth.reason : 'אין הרשאה או שהחיבור פג');
        return;
      }

      DATA = d || {};
      window.DATA = DATA;

      mergeData_Build13_2(d);
      renderShell_Build13_2(d);

      renderDashboard();
      tableProjects();
      tableContacts();
      tableTasks();

      if(DATA.canSeeSettings){
        renderSettings();
      }

      if(typeof renderCalendarDashboard === 'function'){
        renderCalendarDashboard();
      }

      if(typeof updateCalendarViewButtons === 'function'){
        updateCalendarViewButtons();
      }

      const waiters = (primaryAfter ? [primaryAfter] : []).concat(window.__BH_CORE_REFRESH_WAITERS__ || []);
      window.__BH_CORE_REFRESH_WAITERS__ = [];
      window.__BH_CORE_REFRESHING__ = false;
      waiters.forEach(cb=>{
        try{ cb(); }catch(err){ console.log(err); }
      });
    })
    .withFailureHandler(e=>{
      window.__BH_CORE_REFRESHING__ = false;
      window.__BH_CORE_REFRESH_WAITERS__ = [];
      alert(e.message);
    })
    .קבלת_נתוני_ליבה_Build13(token);
}

<script>
(function(){
  function durationOptions(selected='60'){
    const arr=[15,30,45,60,75,90,120];
    return arr.map(x=>`<option value="${x}" ${String(x)===String(selected||60)?'selected':''}>${x} דקות</option>`).join('');
  }

  function addMinutesToTime(time, minutes){
    if(!time) return '';
    const parts=String(time).split(':');
    const d=new Date(2000,0,1,Number(parts[0]||0),Number(parts[1]||0),0,0);
    d.setMinutes(d.getMinutes()+Number(minutes||60));
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  window.updateMeetingEndByDuration = function(force=false){
    try{
      if(typeof tType==='undefined' || tType.value!=='פגישה') return;
      if(!tTime || !tDuration || !tEndTime) return;
      if(force || !tEndTime.value){
        tEndTime.value = addMinutesToTime(tTime.value, tDuration.value || 60);
      }
    }catch(e){}
  };

  window.updateTaskFields = function(){
    try{
      const hasDate = !!tDate.value;
      const isMeeting = tType.value === 'פגישה';
      taskTimeBlock.classList.toggle('hidden', !hasDate);
      if(document.getElementById('taskEndTimeBlock')) taskEndTimeBlock.classList.toggle('hidden', !(hasDate && isMeeting));
      if(document.getElementById('meetingLocationBlock')) meetingLocationBlock.classList.toggle('hidden', !(hasDate && isMeeting));
      if(document.getElementById('calendarGuestsBlock')) calendarGuestsBlock.classList.toggle('hidden', !(hasDate && tCalendar && tCalendar.value==='כן'));
      if(hasDate && isMeeting) updateMeetingEndByDuration(false);
    }catch(e){}
  };

  function contactOptions(selected='', allowedIds=null){
  let contacts = (DATA.contacts || [])
    .filter(c =>
      String(c['בארכיון'] || '') !== 'כן' ||
      String(c['מזהה איש קשר']) === String(selected)
    );

  if(allowedIds && allowedIds.length){
    contacts = contacts.filter(c => allowedIds.includes(c['מזהה איש קשר']));
  }

  return `<option value="">ללא איש קשר</option>`+
    contacts.map(c =>
      `<option value="${esc(c['מזהה איש קשר'])}" ${String(c['מזהה איש קשר'])===String(selected)?'selected':''}>
        ${esc(c['שם מלא'] || '')}
      </option>`
    ).join('');
}


  window.openTask = function(r={}, preset={}){
    r={...r,...preset};
    const allowedIds = preset.allowedContactIds || null;
    const isMeeting = (r['סוג משימה'] || 'משימה') === 'פגישה';

<script>
(function(){
  const BRAND_KEY = 'BH_CRM_BRANDING_FINAL';
  const USER_KEY = 'CRM_USER_INFO';

  function safeText(v){ return String(v || '').trim(); }
  function escHtml(s){
    return String(s || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');
  }
  function px(v){
    v = safeText(v);
    if(!v) return '68px';
    return /^\d+$/.test(v) ? v + 'px' : v;
  }
  function driveThumb(url){
    url = safeText(url);
    if(!url) return '';
    const m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/) || url.match(/[?&]id=([^&]+)/);
    if(m && m[1]) return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(m[1]) + '&sz=w1000';
    return url;
  }
  function readJson(key){
    try { return JSON.parse(localStorage.getItem(key) || '{}') || {}; } catch(e){ return {}; }
  }
  function writeJson(key, val){
    try { localStorage.setItem(key, JSON.stringify(val || {})); } catch(e){}
  }
  function brandingFromData(d){
    d = d || window.DATA || {};
    const sys = d.system || {};
    const brandingRows = (((d.realSettings || {}).branding) || []);
    const map = {};
    brandingRows.forEach(r => { if(r && r['מפתח']) map[r['מפתח']] = r['ערך']; });

    const out = {
      name: safeText(sys.name || map['שם מערכת'] || ''),
      primaryColor: safeText(sys.primaryColor || map['צבע ראשי'] || ''),
      secondaryColor: safeText(sys.secondaryColor || map['צבע משני'] || ''),
      logo: safeText(sys.logo || map['לוגו'] || ''),
      logoHeight: safeText(sys.logoHeight || map['גובה לוגו'] || '68'),
      logoPosition: safeText(sys.logoPosition || map['מיקום לוגו'] || 'ימין')
    };
    return out;
  }
  function currentBranding(d){
    const fresh = brandingFromData(d);
    const old = readJson(BRAND_KEY);
    const merged = {
      name: fresh.name || old.name || 'מערכת ניהול בית חכם',
      primaryColor: fresh.primaryColor || old.primaryColor || '#1f4e79',
      secondaryColor: fresh.secondaryColor || old.secondaryColor || '#e8eef5',
      logo: fresh.logo || old.logo || '',
      logoHeight: fresh.logoHeight || old.logoHeight || '68',
      logoPosition: fresh.logoPosition || old.logoPosition || 'ימין'
    };
    writeJson(BRAND_KEY, merged);
    return merged;
  }
  function currentUser(d){
    d = d || window.DATA || {};
    const u = d.currentUser || readJson(USER_KEY) || {};
    if(d.currentUser) writeJson(USER_KEY, d.currentUser);
    return u;
  }

  window.BH_FORCE_BRANDING = function(d){
    try{
      const b = currentBranding(d);
      const u = currentUser(d);
      const logoUrl = driveThumb(b.logo);

      document.documentElement.style.setProperty('--primary', b.primaryColor || '#1f4e79');
      document.documentElement.style.setProperty('--secondary', b.secondaryColor || '#e8eef5');

      if(window.systemNameText){
        systemNameText.textContent = b.name;
      }

      if(window.sideLogoImg && window.sideLogoFallback){
        sideLogoFallback.textContent = b.name;
        if(logoUrl){
          sideLogoImg.onload = function(){
            sideLogoImg.style.setProperty('display','block','important');
            sideLogoFallback.style.setProperty('display','none','important');
          };
          sideLogoImg.onerror = function(){
            sideLogoImg.style.setProperty('display','none','important');
            sideLogoFallback.style.setProperty('display','inline-block','important');
          };
          sideLogoImg.src = logoUrl;
          sideLogoImg.style.maxHeight = px(b.logoHeight);
          sideLogoImg.style.setProperty('display','block','important');
          sideLogoFallback.style.setProperty('display','none','important');
        }else{
          sideLogoImg.removeAttribute('src');
          sideLogoImg.style.setProperty('display','none','important');
          sideLogoFallback.style.setProperty('display','inline-block','important');
        }
      }

      if(window.systemLogoImg){
        systemLogoImg.style.setProperty('display','none','important');
      }

      if(window.userGreeting){
        const greeting = (typeof greetingByHour === 'function') ? greetingByHour() : 'שלום';
        const name = safeText(u.name || u.email || '');
        const role = safeText(u.role || '');
        userGreeting.innerHTML = '<span>' + escHtml(greeting + (name ? ', ' + name : '')) + '</span>' +
          (role ? '<span class="user-role-badge">' + escHtml(role) + '</span>' : '');
      }
      if(window.userArea) userArea.classList.remove('hidden');
    }catch(e){}
  };

  window.applyHeaderFinal = window.BH_FORCE_BRANDING;
  window.BH_applyHeaderFinal = window.BH_FORCE_BRANDING;

    const oldCalendarUltimate = window.renderCalendarDashboard;
  if(typeof oldCalendarUltimate === 'function'){
    window.renderCalendarDashboard = function(){
      const res = oldCalendarUltimate.apply(this, arguments);
      window.BH_FORCE_BRANDING(window.DATA || {});
      setTimeout(function(){ window.BH_FORCE_BRANDING(window.DATA || {}); }, 50);
      return res;
    };
  }

  const oldSetViewUltimate = window.setCalendarView;
  window.setCalendarView = function(v){
    let res;
    if(typeof oldSetViewUltimate === 'function') res = oldSetViewUltimate.apply(this, arguments);
    window.BH_FORCE_BRANDING(window.DATA || {});
    setTimeout(function(){ window.BH_FORCE_BRANDING(window.DATA || {}); }, 50);
    return res;
  };

  document.addEventListener('click', function(){
    setTimeout(function(){ window.BH_FORCE_BRANDING(window.DATA || {}); }, 30);
  }, true);

  setTimeout(function(){ window.BH_FORCE_BRANDING(window.DATA || {}); }, 250);
  setTimeout(function(){ window.BH_FORCE_BRANDING(window.DATA || {}); }, 1000);
})();
