<script id="BH14_FINAL_CALENDAR_CREATOR_SCRIPT">
(function(){
  window.BH14_SELECTED_CREATOR = window.BH14_SELECTED_CREATOR || 'all';

  window.calendarCreatorOfTask = function(t){
    const u = (window.DATA && DATA.currentUser) || {};
    return String((t && (t["יוצר אירוע"] || t["אחראי"])) || u.name || u.email || "מערכת").trim();
  };

  window.calendarAllowedCreators = function(){
    const arr = (window.DATA && DATA.calendarCreatorsAllowed) || [];
    const clean = [...new Set(arr.map(x => String(x || '').trim()).filter(Boolean))];
    const fromTasks = [...new Set(((window.DATA && DATA.tasks) || []).map(window.calendarCreatorOfTask).filter(Boolean))];
    const u = (window.DATA && DATA.currentUser) || {};
    const role = String(u.role || '');
    const isOwner = u.isOwner === true || role === 'מנהל ראשי';
    if(isOwner) return [...new Set([...clean, ...fromTasks])];
    return clean.length ? clean : [...new Set([String(u.name || u.email || ''), ...fromTasks])].filter(Boolean);
  };

  window.calendarSelectedCreator = function(){
    const el = document.getElementById('calendarCreatorFilter');
    return el ? el.value : (window.BH14_SELECTED_CREATOR || 'all');
  };

  window.calendarTasksForDate = function(d){
    const iso = fmtDateISO(d);
    const selected = window.calendarSelectedCreator();
    return ((window.DATA && DATA.tasks) || [])
      .filter(t => t['תאריך'] === iso)
      .filter(t => selected === 'all' ? true : window.calendarCreatorOfTask(t) === selected)
      .sort((a,b)=>String(a['שעה']||'').localeCompare(String(b['שעה']||''),'he'));
  };

  window.renderCalendarCreatorFilter = function(){
    const controls = document.querySelector('.calendar-controls');
    if(!controls) return;
    let box = document.getElementById('calendarCreatorFilterBox');
    if(!box){
      box = document.createElement('div');
      box.id = 'calendarCreatorFilterBox';
      box.className = 'calendar-owner-filter';
      controls.parentNode.insertBefore(box, controls.nextSibling);
    }
    const creators = window.calendarAllowedCreators();
    const u = (window.DATA && DATA.currentUser) || {};
    const role = String(u.role || '');
    const isOwner = u.isOwner === true || role === 'מנהל ראשי';
    let options = '';
    if(isOwner || creators.length > 1) options += `<option value="all">הכל</option>`;
    creators.forEach(c=> options += `<option value="${esc(c)}">${esc(c)}</option>`);
    const current = window.calendarSelectedCreator();
    box.innerHTML = `<label>הצג אירועים:</label><select id="calendarCreatorFilter" onchange="window.BH14_SELECTED_CREATOR=this.value; renderCalendarDashboard();">${options}</select>`;
    const filter = document.getElementById('calendarCreatorFilter');
    if(filter) filter.value = current;
  };

  window.renderCalendarDashboard = function(){
    if(typeof calendarBox === 'undefined') return;
    try{ updateCalendarViewButtons(); }catch(e){}
    try{ window.renderCalendarCreatorFilter(); }catch(e){}

    let days=[];
    const base=new Date(CAL_DATE);
    let gridClass='';

    if(CAL_VIEW==='day'){
      days=[base];
      calendarTitle.textContent=fmtDateDMY(base);
    }
    if(CAL_VIEW==='week'){
      const s=startOfWeek(base);
      for(let i=0;i<7;i++){ const d=new Date(s); d.setDate(s.getDate()+i); days.push(d); }
      calendarTitle.textContent=fmtWeekRange(days[0], days[6]);

<script id="BH_MONTH_START_FIX">
(function(){

  function BH_creatorName(t){
    return String(t['יוצר אירוע'] || t['יומן'] || t['תג יומן'] || '').trim();
  }

  function BH_creatorColor(t){
    const idx = Number(t['calendarColorIndex'] || 0);
    const colors = [
      ['#dbeafe','#1d4ed8'],
      ['#dcfce7','#15803d'],
      ['#ffedd5','#c2410c'],
      ['#f3e8ff','#7e22ce'],
      ['#fee2e2','#b91c1c'],
      ['#e0f2fe','#0369a1'],
      ['#fef9c3','#a16207'],
      ['#f1f5f9','#334155']
    ];
    return colors[(idx && idx > 0 ? idx - 1 : 0) % colors.length];
  }

  function BH_creatorBadge(t){
    const name = BH_creatorName(t);
    if(!name) return '';
    const c = BH_creatorColor(t);
    return `<span class="creator-badge" style="background:${c[0]};color:${c[1]}">
      <span class="creator-dot" style="background:${c[1]}"></span>${esc(name)}
    </span>`;
  }

  window.renderCalendarDashboard = function(){
    if(typeof calendarBox === 'undefined') return;

    try{ updateCalendarViewButtons(); }catch(e){}
    try{ BH_ensureCalendarFilter(); }catch(e){}

    let days = [];
    const base = new Date(CAL_DATE);
    let gridClass = '';
    let leadingBlanks = 0;

    if(CAL_VIEW === 'day'){
      days = [base];
      calendarTitle.textContent = fmtDateDMY(base);
    }

    if(CAL_VIEW === 'week'){
      const s = startOfWeek(base);
      for(let i=0;i<7;i++){
        const d = new Date(s);
        d.setDate(s.getDate()+i);
        days.push(d);
      }
      calendarTitle.textContent = fmtWeekRange(days[0], days[6]);
    }

    if(CAL_VIEW === 'month'){
      const first = new Date(base.getFullYear(), base.getMonth(), 1);
      const last = new Date(base.getFullYear(), base.getMonth()+1, 0);
      leadingBlanks = first.getDay();
      for(let i=1;i<=last.getDate();i++){
        days.push(new Date(base.getFullYear(), base.getMonth(), i));
      }
      calendarTitle.textContent = new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(base);
      gridClass = ' month-only';
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    const blanks = CAL_VIEW === 'month'
      ? Array.from({length: leadingBlanks}).map(()=>'<div class="calendar-day" style="visibility:hidden"></div>').join('')
      : '';

    calendarBox.innerHTML =
      `<div class="calendar-grid${gridClass}">` +
      blanks +
      days.map(d=>{

})();

      <select id="calendarCreatorFilter" onchange="window.BH_SELECTED_CALENDAR_OWNER=this.value; renderCalendarDashboard();">
        ${canAll ? '<option value="all">הצג הכל</option>' : ''}
        ${owners.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')}
      </select>
    `;

    const sel = document.getElementById('calendarCreatorFilter');
    if(sel) sel.value = current;
  };

  window.calendarTasksForDate = function(d){
    BH_ensureCalendarFilter();

    const iso = fmtDateISO(d);
    const source = DATA.calendarTasks || DATA.tasks || [];
    const selected = window.BH_SELECTED_CALENDAR_OWNER || 'all';
    const canAll = DATA && DATA.calendarCreatorPermission && DATA.calendarCreatorPermission.mode === 'all';

    return source
      .filter(t => t['תאריך'] === iso)
      .filter(t => selected === 'all' ? canAll : BH_calendarOwner(t) === selected)
      .sort((a,b)=>String(a['שעה']||'').localeCompare(String(b['שעה']||''),'he'));
  };

})();
</script>

      <div id="userCalendarPermsBox">טוען...</div>

    `;
    modal.classList.remove('hidden');

    google.script.run
      .withSuccessHandler(d=>drawUserCalendarPerms(userRow,d))
      .withFailureHandler(e=>userCalendarPermsBox.innerHTML='<div class="danger">שגיאה: '+esc(e.message)+'</div>')
      .BH15_נתוני_ניהול_הרשאות_יומן(currentToken());
  };

  function drawUserCalendarPerms(userRow,d){
    const userName = userRow['שם מלא'] || userRow['אימייל'] || '';
    const perms = (d.permissions || []).filter(p =>
      String(p['משתמש'] || '').trim() === String(userName).trim()
    );

    const users = d.users || [];
    const projects = d.projects || [];
    const contacts = d.contacts || [];

    const userOptions = users.map(u=>{
      const label = u.name || u.email;
      return `<option value="${esc(label)}">${esc(label)}</option>`;
    }).join('');

    const projectOptions = projects.map(p=>
      `<option value="${esc(p.id || p.name)}">${esc(p.name || p.id)}</option>`
    ).join('');

    const contactOptions = contacts.map(c=>
      `<option value="${esc(c.id || c.name)}">${esc(c.name || c.id)}</option>`

    userCalendarPermsBox.innerHTML = `

        <h3>הוספת הרשאה</h3>

        <input type="hidden" id="userCalPermUser" value="${esc(userName)}">

        <label>סוג הרשאה</label>
        <select id="userCalPermType" onchange="refreshUserCalPermValue()">
          <option value="יוצר">אירועים שיצר משתמש מסוים</option>
          <option value="פרויקט">אירועים של פרויקט מסוים</option>
          <option value="איש קשר">אירועים של איש קשר מסוים</option>
        </select>

        <label id="userCalPermValueLabel">בחר יוצר</label>
        <select id="userCalPermValue"></select>

        <label>היקף</label>
        <select id="userCalPermFromNow">
          <option value="לא">כל ההיסטוריה</option>
          <option value="כן">מעתה ואילך</option>
        </select>

        <button class="primary" onclick="saveUserCalendarPermission()">שמור הרשאה</button>
      </div>

      <div class="card">
        <h3>הרשאות קיימות</h3>
        ${renderUserCalendarPermsTable(perms)}
      </div>
    `;

    refreshUserCalPermValue();
  }

  window.refreshUserCalPermValue = function(){
    const type = userCalPermType.value;

    if(type === 'יוצר'){
      userCalPermValueLabel.textContent = 'בחר יוצר';
      userCalPermValue.innerHTML = window.__USER_CAL_PERM_OPTIONS__.creator || '';

    if(type === 'פרויקט'){
      userCalPermValueLabel.textContent = 'בחר פרויקט';
      userCalPermValue.innerHTML = window.__USER_CAL_PERM_OPTIONS__.project || '';
    }

    if(type === 'איש קשר'){
      userCalPermValueLabel.textContent = 'בחר איש קשר';
      userCalPermValue.innerHTML = window.__USER_CAL_PERM_OPTIONS__.contact || '';
    }

  function renderUserCalendarPermsTable(perms){
    if(!perms.length) return '<p class="muted">אין הרשאות יומן למשתמש זה.</p>';

    let h = '<table><tr><th>הרשאה</th><th>היקף</th><th>פעיל</th><th>פעולה</th></tr>';

    perms.forEach(p=>{
      const id = esc(p['מזהה הרשאה'] || '');

        val;

      const scope = String(p['מעתה ואילך'] || 'לא') === 'כן'

      h += `
        <tr>
          <td>${esc(text)}</td>
          <td>${esc(scope)}</td>
          <td>${esc(p['פעיל'] || '')}</td>
          <td><button class="danger" onclick="deleteUserCalendarPermission('${id}')">בטל</button></td>
        </tr>

    return h + '</table>';

  window.saveUserCalendarPermission = function(){

      .withSuccessHandler(()=>{
        alert('הרשאת היומן נשמרה');

      .withFailureHandler(e=>alert(e.message))

        type: userCalPermType.value,
        value: userCalPermValue.value,
        active: 'כן',
        fromNow: userCalPermFromNow.value
      });

  window.deleteUserCalendarPermission = function(id){

    google.script.run
      .withSuccessHandler(()=>{
        alert('ההרשאה בוטלה');
        closeM();
        renderUsersSettings();
      })
      .withFailureHandler(e=>alert(e.message))
      .BH15_מחיקת_הרשאת_יומן({
        authToken: currentToken(),
        id:id
      });
  };

})();
</script>

    if(isOwnerOrSuperAdmin()) return true;
    return !String(c['כניסה ראשונה למערכת'] || '').trim();
  } catch(e) {
    console.warn('contact invitation eligibility unavailable', e);
    return false;
  }

  const btn = document.getElementById('contactInviteBtn');

}

function BH_calendarOwners(){
  const source = DATA.calendarTasks || DATA.tasks || [];
  return [...new Set(source.map(BH_calendarOwner).filter(Boolean))]
    .sort((a,b)=>a.localeCompare(b,'he'));
}

function BH_ensureCalendarFilter(){
  const controls = document.querySelector('.calendar-controls');
  if(!controls) return;

  let box = document.getElementById('calendarCreatorFilterBox');
  if(!box){
    box = document.createElement('span');
    box.id = 'calendarCreatorFilterBox';
    box.className = 'calendar-owner-filter';
    controls.insertBefore(box, controls.firstChild);
  }

  const current = window.BH_SELECTED_CALENDAR_OWNER || 'all';
  const owners = BH_calendarOwners();
  const canAll = DATA && DATA.calendarCreatorPermission && DATA.calendarCreatorPermission.mode === 'all';

  box.style.setProperty('display','inline-flex','important');
  box.style.alignItems = 'center';
  box.style.gap = '6px';
  box.style.margin = '0 0 0 42px';
  box.style.fontSize = '13px';
  box.style.fontWeight = '600';
  box.style.color = '#475569';

  box.innerHTML = `
    <label style="font-size:13px;font-weight:700;color:#475569;white-space:nowrap">סינון יוצר:</label>
    <select id="calendarCreatorFilter"
      style="width:150px;min-width:150px;height:34px;font-size:13px;padding:4px 10px;border-radius:10px"
      onchange="window.BH_SELECTED_CALENDAR_OWNER=this.value; renderCalendarDashboard();">
      ${canAll ? '<option value="all">הצג הכל</option>' : ''}
      ${owners.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')}
    </select>
  `;

  const sel = document.getElementById('calendarCreatorFilter');
  if(sel) sel.value = current;
}

window.calendarTasksForDate = function(d){
  BH_ensureCalendarFilter();

  const iso = fmtDateISO(d);
  const source = DATA.calendarTasks || DATA.tasks || [];
  const selected = window.BH_SELECTED_CALENDAR_OWNER || 'all';
  const canAll = DATA?.calendarCreatorPermission?.mode === 'all';

  return source
    .filter(t => t['תאריך'] === iso)
    .filter(t => {
      if(selected === 'all') return canAll;
      return BH_calendarOwner(t) === selected;
    })
    .sort((a,b)=>String(a['שעה']||'').localeCompare(String(b['שעה']||''),'he'));
};


})();

  const TASK_VALUE_KEYS = {'מזהה פרויקט':'משויך לפרויקט','איש קשר':'שם איש קשר','מזהה איש קשר':'שם איש קשר'};
  function yes(v, def){ const s=String(v ?? '').trim(); if(!s) return def; return ['כן','true','1','yes'].includes(s.toLowerCase()); }
  function settings(entity){
    const aliases = ENTITY_ALIASES[entity] || [];
    return ((window.DATA && DATA.fields) || [])
      .filter(f => aliases.includes(String(f['ישות']||'').trim()) && yes(f['פעיל'], true) && String(f['שם שדה']||'').trim())
      .filter(f => canManageAssignmentDomains() || !(entity==='project' && String(f['שם שדה']||'').trim()==='תחום שיוך'))
      .map((f,i)=>({name:String(f['שם שדה']).trim(), order:Number(f['סדר תצוגה'] || f['סדר'] || f['order'] || 9999), i, raw:f}))
      .sort((a,b)=>(isFinite(a.order)?a.order:9999)-(isFinite(b.order)?b.order:9999) || a.i-b.i);
  }
  function configured(entity, prop, fallback){
    const arr = settings(entity).filter(f=>yes(f.raw[prop], false)).map(f=>f.name);
    return arr.length ? arr : fallback.slice();
  }
  function fieldsFor(entity, kind){
    const def = DEFAULTS[entity];
    const prop = kind==='list' ? 'מוצג ברשימה' : kind==='card' ? 'מוצג בכרטיס' : 'ניתן לחיפוש';
    let arr = configured(entity, prop, def[kind]);
    if(kind==='list' && !arr.includes(def.title)) arr.unshift(def.title);
    return arr.filter((v,i,a)=>a.indexOf(v)===i);
  }
  function label(entity, key){ return (DEFAULTS[entity].labels[key] || key); }
  function cols(entity, kind){ return fieldsFor(entity, kind).map(k=>({key: entity==='task' ? (TASK_VALUE_KEYS[k] || k) : k, label: label(entity,k)})); }
  function requiredMark(entity, key){ if(entity==='project' && key==='תחום שיוך' && !canManageAssignmentDomains()) return ''; return settings(entity).some(f=>f.name===key && yes(f.raw['חובה'], false)) ? ' <span class="danger">*</span>' : ''; }
  window.BH_requiredMark = requiredMark;
  function cardGrid(entity, row, extra){
    const html = fieldsFor(entity,'card').filter(k=>k!==DEFAULTS[entity].title).map(k=>{
      const valueKey = entity==='task' ? (TASK_VALUE_KEYS[k] || k) : k;
      const value = extra && valueKey in extra ? extra[valueKey] : row[valueKey];
      return `<div><b>${esc(label(entity,k))}:</b> ${val(value)}</div>`;
    }).join('');
    return html || DEFAULTS[entity].card.map(k=>`<div><b>${esc(label(entity,k))}:</b> ${val(row[k])}</div>`).join('');
  }

  window.tableProjects = function(){
    let rows = filtered(
      (DATA.projects || []).filter(r => String(r['בארכיון'] || '') !== 'כן'),
      projectSearch?.value,
      fieldsFor('project','search')
    );
    rows = sortRows(rows, projectSort?.value || 'dateDesc', 'שם פרויקט');
    projectsTable.innerHTML = tableHtml(rows, cols('project','list'), r=>`openProjectCard('${esc(r['מזהה פרויקט'])}')`, r=>{
      const id = esc(r['מזהה פרויקט']);
      return `<button onclick="openProjectCard('${id}')">ערוך</button> <button class="danger" onclick="delProject('${id}')">העבר לארכיון</button>`;
    });
  };
  window.tableContacts = function(){
    let rows = filtered(
      (DATA.contacts || []).filter(r => String(r['בארכיון'] || '') !== 'כן'),
      contactSearch?.value,
      fieldsFor('contact','search')
    );
    rows = sortRows(rows, contactSort?.value || 'dateDesc', 'שם מלא');
    contactsTable.innerHTML = tableHtml(rows, cols('contact','list'), r=>`openContactCardById('${esc(r['מזהה איש קשר'])}')`, r=>{
      const id = esc(r['מזהה איש קשר']);
      return `<button onclick="openContactEditorById('${id}')">ערוך</button> <button class="danger" onclick="delContact('${id}')">העבר לארכיון</button>`;
    });
  };
  const baseTableTasks = window.tableTasks;
  window.tableTasks = function(){
    baseTableTasks();
    const projectsById = {}; (DATA.projects||[]).forEach(p=>projectsById[String(p['מזהה פרויקט']||'')]=p['שם פרויקט']||'');
    let rows = (DATA.tasks||[]).filter(r=>String(r['בארכיון']||'')!=='כן');
    const selectedProject = window.taskProjectFilter ? taskProjectFilter.value : ''; if(selectedProject) rows = rows.filter(t=>String(t['מזהה פרויקט']||'')===String(selectedProject));
    const f = window.taskFilter ? taskFilter.value || 'all' : 'all';
    const today = new Date(); today.setHours(0,0,0,0); const week = new Date(today); week.setDate(week.getDate()+7);
    rows = rows.filter(t=>{ const d = t['תאריך'] ? parseDateOnly(t['תאריך']) : null; if(f==='open') return t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל'; if(f==='done') return t['סטטוס']==='בוצע'; if(f==='late') return d && d<today && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל'; if(f==='today') return d && d.getTime()===today.getTime() && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל'; if(f==='week') return d && d>today && d<=week && t['סטטוס']!=='בוצע' && t['סטטוס']!=='בוטל'; return true; });
    rows = rows.map(t=>Object.assign({}, t, {'משויך לפרויקט':projectsById[String(t['מזהה פרויקט']||'')]||'', 'שם איש קשר':contactNameById(t['מזהה איש קשר'])}));
    const q = window.taskSearch ? taskSearch.value || '' : ''; rows = filtered(rows, q, fieldsFor('task','search'));
    rows = rows.map(t=>{ const statusValue = t['סטטוס'] || 'פתוח'; return Object.assign({}, t, {'כותרת':`<span class="task-title-note" title="${esc(t['הערות למשימה']||'')}">${esc(t['כותרת']||'')}</span>`, '_canonicalStatus':statusValue, 'סטטוס':`<span class="task-status task-status-${esc(statusValue)}">${esc(statusValue)}</span>`}); });
    tasksTable.innerHTML = tableHtml(rows, cols('task','list'), r=>`openTaskCard('${esc(r['מזהה משימה'])}')`, r=>{ const id=esc(r['מזהה משימה']); const isDone=(r['_canonicalStatus']||r['סטטוס'])==='בוצע'; return `<button onclick="openTaskCard('${id}')">ערוך</button> ${isDone?`<button onclick="reactivateTask('${id}')">החזר לפעיל</button>`:`<button onclick="doneTask('${id}')">בוצע</button>`} <button class="danger" onclick="delTask('${id}')">העבר לארכיון</button>`; });
  };
  const oldProjectCard = window.renderProjectCard, oldContactCard = window.renderContactCard, oldTaskCard = window.renderTaskCard;
  window.renderProjectCard = function(d){ oldProjectCard(d); const p=d.project||{}; const grid=modalBox.querySelector('.grid2'); if(grid) grid.innerHTML=cardGrid('project', p); };
  window.renderContactCard = function(d){ oldContactCard(d); const c=d.contact||{}; const grid=modalBox.querySelector('.grid2'); if(grid) grid.innerHTML=cardGrid('contact', c); };
  window.renderTaskCard = function(d){ oldTaskCard(d); const t=d.task||{}; const grid=modalBox.querySelector('.grid2'); if(grid) grid.innerHTML=cardGrid('task', t, {'משויך לפרויקט':d.projectName||'', 'שם איש קשר':d.contactName||''}); };
})();
</script>

<script id="BH_TOP_LEVEL_TAB_RESET">
(function(){
  const TOP_LEVEL_TABS = {dashboard:1, projects:1, contacts:1, tasks:1, archive:1, settings:1};

  function setValue(id, value){
    const el = document.getElementById(id);
    if(el) el.value = value;
  }

  function clickSettingsTab(id){
    const btn = document.getElementById('set_' + id);
    if(typeof window.settingsTab === 'function') window.settingsTab(id, btn || null);
    else if(typeof window.renderSettings === 'function') window.renderSettings();
  }

  window.resetTopLevelTabState = function(id){
    if(!TOP_LEVEL_TABS[id]) return;

    if(typeof window.closeM === 'function') closeM();

    if(id === 'dashboard'){
      try{ CAL_DATE = new Date(); window.CAL_DATE = CAL_DATE; }catch(e){ window.CAL_DATE = new Date(); }
      try{ CAL_VIEW = 'week'; window.CAL_VIEW = 'week'; }catch(e){ window.CAL_VIEW = 'week'; }
      window.BH_SELECTED_CALENDAR_OWNER = 'all';
      return;
    }

    if(id === 'projects'){
      setValue('projectSearch', '');
      setValue('projectSort', 'dateDesc');
      return;
    }

    if(id === 'contacts'){
      setValue('contactSearch', '');
      setValue('contactSort', 'dateDesc');
      return;
    }

    if(id === 'tasks'){
      setValue('taskSearch', '');
      setValue('taskProjectFilter', '');
      setValue('taskFilter', 'all');
      setValue('taskStatusFilter', '');
      setValue('taskDateFilter', '');
      setValue('taskArchiveFilter', '');
      return;
    }

    if(id === 'archive'){
      setValue('archiveSearch', '');
      setValue('archiveFilter', '');
      window.ARCHIVE_TAB = 'projects';
      return;
    }

    if(id === 'settings'){
      window.SETTINGS_TAB = 'categories';
      try{ SETTINGS_TAB = 'categories'; }catch(e){}
      return;
    }
  };

  const previousTab = window.tab;
  window.tab = function(id, b){
    resetTopLevelTabState(id);

    const result = typeof previousTab === 'function'
      ? previousTab.apply(this, arguments)
      : undefined;

    if(id === 'settings'){
      clickSettingsTab('categories');
    }

    return result;
  };
})();
</script>
<script id="BH_ASSIGNMENT_DOMAIN_BRANDING">
(function(){
  function escLocal(v){ return String(v==null?'':v).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
  function activeRootBranding(){ return (window.DATA && (DATA.rootBranding || DATA.system)) || {}; }
  function defaultBranding(){ return (window.DATA && (DATA.defaultBranding || DATA.system)) || {}; }
  function applyBranding(b){
    b = b || defaultBranding();
    if(typeof window.BH_FORCE_BRANDING === 'function'){
      const old = window.DATA || {};
      window.BH_FORCE_BRANDING({ system: b, currentUser: old.currentUser || {}, realSettings: old.realSettings || {} });
      return;
    }
    document.documentElement.style.setProperty('--primary', b.primaryColor || '#1f4e79');
    document.documentElement.style.setProperty('--secondary', b.secondaryColor || '#e8eef5');
    if(window.systemNameText) systemNameText.textContent = b.name || 'בית חכם';
  }
  window.BH_applyRootBranding = function(){ applyBranding(activeRootBranding()); };
  window.BH_applyProjectBranding = function(projectBranding){ applyBranding(projectBranding || defaultBranding()); };

  const oldRender = window.render;
  if(typeof oldRender === 'function'){
    window.render = function(d){
      const res = oldRender.apply(this, arguments);
      try{ window.BH_applyRootBranding(); }catch(e){}
      return res;
    };
  }

  const oldTab = window.tab;
  if(typeof oldTab === 'function'){
    window.tab = function(id, b){
      const res = oldTab.apply(this, arguments);
      if({dashboard:1,projects:1,contacts:1,tasks:1,archive:1,settings:1}[id]){
        try{ window.BH_applyRootBranding(); }catch(e){}
      }
      return res;
    };
  }

  window.openProjectCard = function(id){
    google.script.run
      .withSuccessHandler(function(d){
        try{ window.BH_applyProjectBranding(d && d.projectBranding); }catch(e){}
        renderProjectCard(d);
      })
      .withFailureHandler(e=>alert(e.message))
      .כרטיס_פרויקט({ id:id, token: currentToken() });
  };

  const oldRenderProjectCard = window.renderProjectCard;
  if(typeof oldRenderProjectCard === 'function'){
    window.renderProjectCard = function(d){
      try{ window.BH_applyProjectBranding(d && d.projectBranding); }catch(e){}
      return oldRenderProjectCard.apply(this, arguments);
    };
  }

  function domainBrandAdmin(){ return (window.DATA && DATA.domainBrandingAdmin) || null; }
  function domainBrandRows(){ const admin=domainBrandAdmin(); return (admin && admin.rows) || []; }
  function isActiveBrandRow(r){ return String((r&&r['פעיל']) || 'כן').trim() !== 'לא'; }
  function brandRowById(id){ return domainBrandRows().find(r=>String(r['מזהה מיתוג']||'')===String(id||'')) || null; }
  function activeBrandDomains(exceptId){
    return domainBrandRows().filter(r=>isActiveBrandRow(r) && String(r['מזהה מיתוג']||'')!==String(exceptId||'')).map(r=>String(r['תחום שיוך']||'').trim()).filter(Boolean);
  }
  function domainBrandOptions(selected, editingId){
    const admin=domainBrandAdmin() || {};
    const activeDomains=activeBrandDomains(editingId);
    const all=(admin.domains||[]).filter(d=>d && d!=='ללא');
    const values=all.filter(d=>String(d)===String(selected||'') || activeDomains.indexOf(String(d))<0);
    return `<option value="">בחר תחום שיוך</option>` + values.map(d=>`<option value="${escLocal(d)}" ${String(d)===String(selected||'')?'selected':''}>${escLocal(d)}</option>`).join('');
  }
  function logoCell(row){
    const logo=String(row['לוגו']||'').trim();
    if(!logo) return '<span class="muted">אין</span>';
    return `<img src="${escLocal(logo)}" alt="לוגו" style="max-height:28px;max-width:80px;object-fit:contain">`;
  }
  function formatBrandDate(v){ return v ? escLocal(v) : ''; }
  function duplicateText(domain){
    const ids=(((domainBrandAdmin()||{}).duplicateDomains||{})[domain]||[]).filter(Boolean);
    return ids.length ? `<div class="muted danger">כפילויות היסטוריות: ${escLocal(ids.join(', '))}</div>` : '';
  }

  const oldRenderBrandingSettings = window.renderBrandingSettings;
  window.renderBrandingSettings = function(){
    if(typeof oldRenderBrandingSettings === 'function') oldRenderBrandingSettings();
    const admin=domainBrandAdmin();
    if(!admin || !settingsBox) return;
    const rows=domainBrandRows().slice().sort((a,b)=>String(a['תחום שיוך']||'').localeCompare(String(b['תחום שיוך']||''),'he'));
    const body=rows.length ? rows.map(r=>{
      const id=escLocal(r['מזהה מיתוג']||'');
      const domain=String(r['תחום שיוך']||'').trim();
      const active=isActiveBrandRow(r);
      return `<tr>
        <td>${escLocal(domain)}${duplicateText(domain)}</td>
        <td>${escLocal(r['שם מערכת']||'')}</td>
        <td>${logoCell(r)}</td>
        <td><span style="display:inline-block;width:18px;height:18px;border:1px solid #ddd;background:${escLocal(r['צבע ראשי']||'transparent')};vertical-align:middle"></span> ${escLocal(r['צבע ראשי']||'')}</td>
        <td><span style="display:inline-block;width:18px;height:18px;border:1px solid #ddd;background:${escLocal(r['צבע משני']||'transparent')};vertical-align:middle"></span> ${escLocal(r['צבע משני']||'')}</td>
        <td>${active?'פעיל':'בארכיון'}</td>
        <td>${formatBrandDate(r['עודכן בתאריך'])}</td>
        <td><button onclick="openDomainBrandingEditor('${id}')">ערוך</button> ${active?`<button class="danger" onclick="archiveDomainBranding('${id}')">העבר לארכיון</button>`:`<button class="ok" onclick="restoreDomainBranding('${id}')">שחזר</button>`}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="8" class="muted">אין עדיין מיתוגי תחומי שיוך</td></tr>';
    settingsBox.insertAdjacentHTML('beforeend', `
      <div class="card"><h3 class="sectionTitle">מיתוגי תחומי שיוך</h3>
        <p class="muted">רשומות פעילות משפיעות על תחום השיוך המתאים בלבד. רשומה בארכיון נשמרת אך אינה פעילה והמערכת תחזור למיתוג ברירת המחדל.</p>
        <div class="toolbar"><button class="primary" onclick="openDomainBrandingEditor()">+ הוסף מיתוג לתחום שיוך</button></div>
        <div class="tableWrap"><table><thead><tr><th>תחום שיוך</th><th>שם מערכת</th><th>לוגו</th><th>צבע ראשי</th><th>צבע משני</th><th>מצב</th><th>עודכן בתאריך</th><th>פעולות</th></tr></thead><tbody>${body}</tbody></table></div>
      </div>`);
  };

  window.openDomainBrandingEditor = function(id){
    const row=id ? brandRowById(id) : {};
    if(id && !row){ alert('רשומת המיתוג לא נמצאה'); return; }
    const selected=row['תחום שיוך'] || '';
    modalBox.innerHTML=`<h3>${id?'עריכת מיתוג תחום שיוך':'הוספת מיתוג לתחום שיוך'}</h3>
      <input type="hidden" id="domainBrandId" value="${escLocal(row['מזהה מיתוג']||'')}">
      <label>תחום שיוך</label><select id="domainBrandDomain" ${id?'disabled':''}>${domainBrandOptions(selected, row['מזהה מיתוג']||'')}</select>
      <label>שם מערכת</label><input id="domainBrandName" value="${escLocal(row['שם מערכת']||'')}">
      <label>לוגו</label><input id="domainBrandLogo" value="${escLocal(row['לוגו']||'')}">
      <label>צבע ראשי</label><input id="domainBrandPrimary" value="${escLocal(row['צבע ראשי']||'#1f4e79')}">
      <label>צבע משני</label><input id="domainBrandSecondary" value="${escLocal(row['צבע משני']||'#e8eef5')}">
      <label>גובה לוגו</label><input id="domainBrandLogoHeight" type="number" value="${escLocal(row['גובה לוגו']||'40')}">
      <label>פעיל</label><select id="domainBrandActive"><option value="כן" ${String(row['פעיל']||'כן')!=='לא'?'selected':''}>כן</option><option value="לא" ${String(row['פעיל']||'כן')==='לא'?'selected':''}>לא</option></select>
      <p class="muted">אם קיימת רשומה בארכיון לאותו תחום, השמירה תעדכן/תשחזר אותה במקום ליצור כפילות לא מבוקרת.</p>
      <div class="actions"><button class="primary" onclick="saveDomainBranding()">שמור</button><button onclick="closeM()">ביטול</button></div>`;
    modal.classList.remove('hidden');
  };

  window.saveDomainBranding = function(){
    google.script.run.withSuccessHandler((res)=>{
        closeM();
        load(false);
        const duplicates=(res&&res.duplicateIds&&res.duplicateIds.length)?('\nנמצאו כפילויות היסטוריות שלא נמחקו: '+res.duplicateIds.join(', ')):'';
        alert('מיתוג תחום השיוך נשמר'+duplicates);
      }).withFailureHandler(e=>alert(e.message)).שמירת_מיתוג_תחום_שיוך({
        authToken: currentToken(), id: domainBrandId.value, assignmentDomain: domainBrandDomain.value,
        systemName: domainBrandName.value, logo: domainBrandLogo.value, primaryColor: domainBrandPrimary.value,
        secondaryColor: domainBrandSecondary.value, logoHeight: domainBrandLogoHeight.value, active: domainBrandActive.value
      });
  };

  window.archiveDomainBranding = function(id){
    if(!confirm('להעביר את מיתוג תחום השיוך לארכיון?')) return;
    google.script.run.withSuccessHandler(()=>load(false)).withFailureHandler(e=>alert(e.message)).העברת_מיתוג_תחום_שיוך_לארכיון({authToken:currentToken(),id});
  };

  window.restoreDomainBranding = function(id){
    google.script.run.withSuccessHandler(()=>load(false)).withFailureHandler(e=>alert(e.message)).שחזור_מיתוג_תחום_שיוך({authToken:currentToken(),id});
  };
})();
</script>



<script id="BH_CUSTOMER_ASSIGNMENT_DOMAIN_SELECTION">

<script id="BH_SYSTEM_USERS_ADMIN_FLOW">
(function(){
  function systemUserRows(){
    return (DATA.contacts || []).filter(c => String(c['הרשאת מערכת'] || 'ללא הרשאה').trim() !== 'ללא הרשאה');
  }

  function userResponsibleManager(row){
    const role = String(row['הרשאת מערכת'] || '').trim();
    if(role === 'משתמש') return row['מנהל'] || '';
    if(role === 'לקוח') return row['אחראי'] || '';
    return row['מנהל'] || row['אחראי'] || '';
  }

  function systemUsersTable(rows){
    const superAdmin = canManageAssignmentDomains();
    const hasFirstLogin = rows.some(r => Object.prototype.hasOwnProperty.call(r, 'כניסה ראשונה למערכת'));
    const cols = [
      ['שם מלא','שם'],
      ['אימייל','אימייל'],
      ['טלפון','טלפון'],
      ['הרשאת מערכת','הרשאת מערכת'],
      ['פעיל במערכת','פעיל במערכת'],
      ['__manager','מנהל אחראי']
    ];
    if(superAdmin){
      cols.push(['תחום שיוך מרכזי','תחום שיוך מרכזי']);
      cols.push(['תחומי שיוך','תחומי שיוך נוספים']);
    }
    if(hasFirstLogin) cols.push(['כניסה ראשונה למערכת','כניסה ראשונה למערכת']);

    if(!rows.length) return '<p class="muted">אין כרגע אנשי קשר עם הרשאת מערכת.</p>';
    let html = '<table><tr>' + cols.map(c=>`<th>${esc(c[1])}</th>`).join('') + '<th>פעולות</th></tr>';
    rows.forEach(row=>{
      html += '<tr>' + cols.map(([key])=>{
        const value = key === '__manager' ? userResponsibleManager(row) : row[key];
        return `<td>${esc(value || '')}</td>`;
      }).join('') + `<td>
        <button onclick='openSystemUserEditor(${JSON.stringify(row)})'>ערוך משתמש</button>
        <button onclick="toggleSystemUserAccess('${esc(row['מזהה איש קשר'] || '')}','${String(row['פעיל במערכת'] || 'כן') === 'לא' ? 'כן' : 'לא'}')">${String(row['פעיל במערכת'] || 'כן') === 'לא' ? 'הפעל גישה' : 'השבת גישה'}</button>
        <button class="primary" onclick='openUserCalendarPerms && openUserCalendarPerms(${JSON.stringify(row)})'>הרשאות יומן</button>
      </td></tr>`;
    });
    return html + '</table>';
  }

  window.renderUsersSettings = function(){
    const rows = systemUserRows();
    let html = `<div class="toolbar"><button class="primary" onclick="openPermissionContactPicker()">+ מתן הרשאה לאיש קשר</button></div>`;
    html += `<p class="muted"><b>משתמשים</b> מנהל את זהות הגישה של אנשי קשר למערכת: הרשאת מערכת, מצב פעיל, מנהל אחראי ותחומי שיוך למנהלים. פרטי CRM רגילים ממשיכים להתנהל בלשונית אנשי קשר.</p>`;
    html += systemUsersTable(rows);
    settingsBox.innerHTML = html;
  };

  window.renderPermissionsSettings = (function(original){
    return function(){
      if(typeof original === 'function') original();
      if(settingsBox){
        settingsBox.insertAdjacentHTML('afterbegin', `<p class="muted"><b>הרשאות</b> מגדיר מה כל תפקיד או הרשאה פרטנית רשאים לעשות במערכת. זהו מסך מטריצת הרשאות, ולא עריכת משתמשים יחידים.</p>`);
      }
    };
  })(window.renderPermissionsSettings);

  window.openSystemUserEditor = function(row={}){
    const role = String(row['הרשאת מערכת'] || 'משתמש').trim();
    const active = String(row['פעיל במערכת'] || 'כן').trim() === 'לא' ? 'לא' : 'כן';
    const superAdmin = canManageAssignmentDomains();
    modalBox.className='box small';
    modalBox.innerHTML = `
      <h2>עריכת משתמש מערכת</h2>
      <p class="muted">עורך שדות גישה בלבד. שם, אימייל וטלפון מוצגים לזיהוי ונערכים מכרטיס איש הקשר.</p>
      <div class="card">
        <div><b>שם:</b> ${esc(row['שם מלא'] || '')}</div>
        <div><b>אימייל:</b> ${esc(row['אימייל'] || '')}</div>
        <div><b>טלפון:</b> ${esc(row['טלפון'] || '')}</div>
      </div>
      <label>הרשאת מערכת</label>
      <select id="suPermission" onchange="updateSystemUserEditorFields()">${permissionOptions(role)}</select>
      <label>פעיל במערכת</label>
      <select id="suActive"><option value="כן" ${active==='כן'?'selected':''}>כן</option><option value="לא" ${active==='לא'?'selected':''}>לא</option></select>
      <div id="suManagerBox" class="hidden"><label>מנהל אחראי</label><select id="suManager"><option value="">בחר מנהל</option>${permissionUsersOptions('מנהל', row['מנהל'])}</select></div>
      <div id="suOwnerBox" class="hidden"><label>מנהל אחראי</label><select id="suOwner"><option value="">בחר אחראי</option>${permissionUsersOptions('משתמש', row['אחראי'])}</select></div>
      ${superAdmin ? `<div id="suAssignmentDomainsBox" class="hidden">
        <label>תחום שיוך מרכזי</label><select id="suCentralAssignmentDomain"><option value="">ללא</option>${assignmentDomainOptions(row['תחום שיוך מרכזי'] || '').replace(/<option value="ללא"[^>]*>ללא<\/option>/,'')}</select>
        <label>תחומי שיוך נוספים</label><select id="suAdditionalAssignmentDomains" multiple size="5">${assignmentDomainsMulti(row['תחומי שיוך'] || '')}</select>
        <p class="muted">זמין רק לבעלים / מנהל ראשי ורק עבור הרשאת מנהל. “ללא” לא נשמר בתחומים נוספים, והתחום המרכזי לא יופיע בהם.</p>
      </div>` : ''}
      <button class="primary" onclick="saveSystemUser('${esc(row['מזהה איש קשר'] || '')}')">שמור משתמש</button>
      <button onclick="closeM()">ביטול</button>`;
    modal.classList.remove('hidden');
    setTimeout(updateSystemUserEditorFields, 0);
  };

  window.updateSystemUserEditorFields = function(){
    const role = String((window.suPermission && suPermission.value) || '').trim();
    if(window.suManagerBox) suManagerBox.classList.toggle('hidden', role !== 'משתמש');
    if(window.suOwnerBox) suOwnerBox.classList.toggle('hidden', role !== 'לקוח');
    if(window.suAssignmentDomainsBox) suAssignmentDomainsBox.classList.toggle('hidden', role !== 'מנהל' || !canManageAssignmentDomains());
    if(window.suAdditionalAssignmentDomains && window.suCentralAssignmentDomain){
      const central = suCentralAssignmentDomain.value;
      Array.from(suAdditionalAssignmentDomains.options).forEach(o=>{
        o.disabled = !o.value || o.value === 'ללא' || o.value === central;
        if(o.disabled) o.selected = false;
      });
      suCentralAssignmentDomain.onchange = updateSystemUserEditorFields;
    }
  };

  window.selectedSystemUserAdditionalDomains = function(){
    if(!window.suAdditionalAssignmentDomains) return '';
    const central = window.suCentralAssignmentDomain ? suCentralAssignmentDomain.value : '';
    return Array.from(suAdditionalAssignmentDomains.selectedOptions).map(o=>o.value).filter(v=>v && v !== 'ללא' && v !== central).join(', ');
  };

  window.saveSystemUser = function(id){
    const payload = {
      authToken: currentToken(), id,
      systemPermission: suPermission.value,
      systemActive: suActive.value,
      manager: window.suManager ? suManager.value : '',
      owner: window.suOwner ? suOwner.value : ''
    };
    if(window.suCentralAssignmentDomain) payload.assignmentCentralDomain = suCentralAssignmentDomain.value;
    if(window.suAdditionalAssignmentDomains) payload.assignmentAdditionalDomains = selectedSystemUserAdditionalDomains();
    google.script.run.withSuccessHandler(()=>{closeM();refreshCore();}).withFailureHandler(e=>alert(e.message))
      .שמירת_משתמש_מערכת(payload);
  };

  window.toggleSystemUserAccess = function(id, nextActive){
    const row = (DATA.contacts || []).find(c => String(c['מזהה איש קשר'] || '') === String(id || ''));
    if(!row) return alert('המשתמש לא נמצא');
    google.script.run.withSuccessHandler(()=>refreshCore()).withFailureHandler(e=>alert(e.message))
      .שמירת_משתמש_מערכת({authToken: currentToken(), id, systemPermission: row['הרשאת מערכת'], systemActive: nextActive});
  };
})();
</script>

<script>
/* Calendar participants persistence + guest sync patch */
(function(){
  function validEmail(v){ return /^[^\s@<>]+@[^\s@<>]+\.[^\s@<>]+$/.test(String(v||'').trim()); }
  function parseCalendarParticipants(value){
    const seen={}; const out=[];
    String(value||'').split(/[;,|\n\r]+/).map(x=>String(x||'').trim()).filter(Boolean).forEach(e=>{
      const key=e.toLowerCase();
      if(validEmail(e) && !seen[key]){ seen[key]=true; out.push(e); }
    });
    return out;
  }
  window.BH_parseCalendarParticipants = parseCalendarParticipants;
  window.BH_normalizeCalendarParticipants = function(values){ return parseCalendarParticipants(Array.isArray(values)?values.join(','):values).join(','); };

  window.participantCandidatesForTask = function(r={}){
    const out=[]; const seen={};
    function isArchived(row){ return String((row||{})['בארכיון']||'')==='כן' || String((row||{})['פעיל']||'כן')==='לא'; }
    function add(label,email){ email=String(email||'').trim(); const key=email.toLowerCase(); if(!validEmail(email)||seen[key]) return; seen[key]=true; out.push({label,email}); }
    const project=(DATA.projects||[]).find(p=>p['מזהה פרויקט']===r['מזהה פרויקט'])||{};
    const taskContact=(DATA.contacts||[]).find(c=>c['מזהה איש קשר']===r['מזהה איש קשר'])||{};
    if(!isArchived(taskContact)) add('איש קשר: '+(taskContact['שם מלא']||''), taskContact['אימייל']);
    const taskOwnerName=r['אחראי']||'';
    const projectOwnerName=project['אחראי']||'';
    (DATA.contacts||[]).filter(c=>!isArchived(c)).forEach(c=>{
      if(taskOwnerName && c['שם מלא']===taskOwnerName) add('אחראי משימה: '+taskOwnerName, c['אימייל']);
      if(projectOwnerName && c['שם מלא']===projectOwnerName) add('אחראי פרויקט: '+projectOwnerName, c['אימייל']);
    });
    (usersList()||[]).filter(u=>String(u['פעיל']||'כן')!=='לא').forEach(u=>{
      if(taskOwnerName && u['שם']===taskOwnerName) add('אחראי משימה: '+taskOwnerName, u['מייל']);
      if(projectOwnerName && u['שם']===projectOwnerName) add('אחראי פרויקט: '+projectOwnerName, u['מייל']);
    });
    const projectId=r['מזהה פרויקט'];
    if(projectId){
      (DATA.links||[]).filter(l=>l['מזהה פרויקט']===projectId && String(l['פעיל']||'כן')!=='לא').forEach(l=>{
        const c=(DATA.contacts||[]).find(x=>x['מזהה איש קשר']===l['מזהה איש קשר']);
        if(c && !isArchived(c)) add('משויך לפרויקט: '+(c['שם מלא']||''), c['אימייל']);
      });
    }
    parseCalendarParticipants(r['משתתפי יומן']||'').forEach(email=>add('משתתף חיצוני/קיים', email));
    return out;
  };

  window.calendarGuestsSelect = function(r={}){
    const selected=parseCalendarParticipants(r['משתתפי יומן']||'').map(x=>x.toLowerCase());
    const arr=participantCandidatesForTask(r);
    if(!arr.length) return '<p class="muted">אין משתתפים עם מייל</p>';
    return `<div id="tCalendarGuestsBox" class="card" style="max-height:190px;overflow:auto">` + arr.map(p=>`
      <label style="display:block;margin:4px 0"><input type="checkbox" name="calendarGuest" value="${esc(p.email)}" ${selected.includes(p.email.toLowerCase())?'checked':''} style="width:auto;margin-left:6px"> ${esc(p.label)} · ${esc(p.email)}</label>
    `).join('') + `</div>`;
  };

  window.selectedCalendarGuests = function(){
    return parseCalendarParticipants(Array.from(document.querySelectorAll('input[name="calendarGuest"]:checked')).map(x=>x.value).join(','));
  };

  const oldSaveTask = window.saveTask;
  window.saveTask = function(id){
    if(!canEdit() && id) return alert('אין לך הרשאה לעריכה');
    if(!canCreate() && !id) return alert('אין לך הרשאה להוספה');
    const normalized = window.BH_normalizeCalendarParticipants(selectedCalendarGuests());
    google.script.run
      .withSuccessHandler(()=>{closeM();refreshCore();})
      .withFailureHandler(e=>alert(e.message))
      .שמירת_משימה({
        authToken:currentToken(), id, title:tTitle.value, taskType:tType.value, priority:tPriority.value,
        date:tDate.value, time:(typeof tTime!=='undefined'?tTime.value:''), endTime:(typeof tEndTime!=='undefined'?tEndTime.value:''),
        meetingDuration:(typeof tDuration!=='undefined'?tDuration.value:''), location:(typeof tLocation!=='undefined'?tLocation.value:''),
        addToCalendar:(typeof tCalendar!=='undefined'?tCalendar.value:'לא'), calendarGuests:normalized, 'משתתפי יומן':normalized,
        status:tStatus.value, projectId:tProject.value, contactId:tContact.value, owner:tOwner.value, taskNotes:tTaskNotes.value
      });
  };
})();
</script>


<script>
(function(){
  function crmEsc(s){ return (typeof esc==='function') ? esc(String(s||'')) : String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function storedParticipants(task){ return (typeof parseCalendarParticipants==='function' ? parseCalendarParticipants(task['משתתפי יומן'] || '') : String(task['משתתפי יומן']||'').split(/[;,|\n\r]+/).map(x=>x.trim()).filter(Boolean)); }
  window.renderPersistedCalendarParticipants = function(task){
    const participants = storedParticipants(task || {});
    if(!participants.length) return '<p class="muted">אין משתתפים ביומן</p>';
    const visibleContacts = (DATA.contacts || []).filter(c=>!(typeof isArchived==='function' && isArchived(c)));
    return '<ul class="calendar-participants-list">' + participants.map(email=>{
      const lower = String(email||'').toLowerCase();
      const c = visibleContacts.find(x=>String(x['אימייל']||'').trim().toLowerCase()===lower);
      return c ? `<li>${crmEsc(c['שם מלא']||'')} — ${crmEsc(email)}</li>` : `<li>${crmEsc(email)} <span class="muted">(משתתף חיצוני)</span></li>`;
    }).join('') + '</ul>';
  };
  const baseRenderTaskCardParticipants = window.renderTaskCard;
  window.renderTaskCard = function(d){
    baseRenderTaskCardParticipants(d);
    const notesTitle = Array.from(modalBox.querySelectorAll('h3')).find(h=>String(h.textContent||'').includes('הערות למשימה'));
    if(notesTitle && !modalBox.querySelector('[data-calendar-participants-section]')){
      const section = document.createElement('div');
      section.setAttribute('data-calendar-participants-section','true');
      section.innerHTML = `<h3 class="sectionTitle">משתתפים ביומן</h3><div class="card">${window.renderPersistedCalendarParticipants((d&&d.task)||{})}</div>`;
      notesTitle.parentNode.insertBefore(section, notesTitle);
    }
  };
})();
</script>
