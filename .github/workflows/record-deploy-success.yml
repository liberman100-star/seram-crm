name: Record deploy success

on:
  workflow_run:
    workflows:
      - Deploy to Apps Script
    types:
      - completed

permissions:
  contents: write

jobs:
  record-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Write deployment success marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .deploy-status
          {
            echo "status=success"
            echo "deployed_commit=${{ github.event.workflow_run.head_sha }}"
            echo "completed_at=${{ github.event.workflow_run.updated_at }}"
            echo "workflow_run_id=${{ github.event.workflow_run.id }}"
          } > .deploy-status/last-success.txt

      - name: Commit success marker
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .deploy-status/last-success.txt
          if git diff --cached --quiet; then
            echo "Success marker already current"
            exit 0
          fi
          git commit -m "Record successful Apps Script deployment"
          git push origin production
