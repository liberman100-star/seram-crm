name: One-time fix Apps Script top navigation

on:
  push:
    branches:
      - production
    paths:
      - .github/workflows/one-time-fix-apps-script-top-navigation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Replace iframe reload with top-level web app navigation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          old = "function hardRefresh(){ window.location.reload(); }"
          new = """const CRM_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyfXuvUth9j7L5-rp0TKEc3CC2gffmgo44y_VDZHwMFObT4pxuNkNrL7Jf0HX5CSQQaCQ/exec';
function hardRefresh(){
  const link = document.createElement('a');
  link.href = CRM_WEB_APP_URL + '?refresh=' + Date.now();
  link.target = '_top';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
}"""

          if old not in html:
              raise SystemExit('Expected hardRefresh source was not found')

          html = html.replace(old, new, 1)

          if "link.target = '_top'" not in html or 'CRM_WEB_APP_URL' not in html:
              raise SystemExit('Top-level navigation verification failed')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit repaired source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Navigate top-level Apps Script web app on refresh"
          git push origin HEAD:production
