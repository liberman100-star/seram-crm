name: One-time replace browser refresh with in-app reload

on:
  push:
    branches:
      - production
    paths:
      - .github/workflows/one-time-fix-apps-script-top-navigation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Replace iframe navigation with safe application reload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          replacement = """function hardRefresh(){
  try{
    if(typeof load === 'function'){
      load();
      return;
    }
  }catch(e){}
  try{
    if(typeof refreshCore === 'function'){
      refreshCore();
    }
  }catch(e){}
}
function goDashboard(){ hardRefresh(); }"""

          pattern = re.compile(
              r"(?:const CRM_WEB_APP_URL\s*=\s*[^;]+;\s*)?function hardRefresh\(\)\s*\{.*?\}\s*function goDashboard\(\)\s*\{.*?\}",
              re.S,
          )

          html, count = pattern.subn(replacement, html, count=1)
          if count != 1:
              raise SystemExit(f'Expected one hardRefresh/goDashboard block, replaced {count}')

          if 'window.location.reload()' in replacement or "target = '_top'" in replacement:
              raise SystemExit('Unsafe browser navigation remains in replacement')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit repaired source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Source already uses safe in-app reload"
            exit 0
          fi
          git commit -m "Use in-app reload instead of iframe navigation"
          git push origin HEAD:production
