name: One-time fix Apps Script top navigation

on:
  push:
    branches:
      - production
    paths:
      - .github/workflows/one-time-fix-apps-script-top-navigation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Replace iframe reload with top-level web app navigation
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'from pathlib import Path; p=Path("index.html"); s=p.read_text(encoding="utf-8"); old="function hardRefresh(){ window.location.reload(); }"; new="const CRM_WEB_APP_URL = \"https://script.google.com/macros/s/AKfycbyfXuvUth9j7L5-rp0TKEc3CC2gffmgo44y_VDZHwMFObT4pxuNkNrL7Jf0HX5CSQQaCQ/exec\";\nfunction hardRefresh(){\n  window.open(CRM_WEB_APP_URL + \"?refresh=\" + Date.now(), \"_top\");\n}"; assert old in s, "Expected hardRefresh source was not found"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          grep -F 'window.open(CRM_WEB_APP_URL + "?refresh=" + Date.now(), "_top")' index.html

      - name: Commit repaired source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Navigate top-level Apps Script web app on refresh"
          git push origin HEAD:production
