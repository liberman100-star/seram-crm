name: One-time fix top-level refresh

on:
  push:
    branches:
      - production
    paths:
      - .github/workflows/one-time-fix-top-level-refresh.yml

permissions:
  contents: write

jobs:
  patch-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Replace iframe reload with top-level navigation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          old = "function hardRefresh(){ window.location.reload(); }"
          new = """function hardRefresh(){
  const appUrl = 'https://script.google.com/macros/s/AKfycbyfXuvUth9j7L5-rp0TKEc3CC2gffmgo44y_VDZHwMFObT4pxuNkNrL7Jf0HX5CSQQaCQ/exec';
  try{
    window.top.location.replace(appUrl);
  }catch(e){
    const a = document.createElement('a');
    a.href = appUrl;
    a.target = '_top';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }
}"""
          if old not in html:
              raise SystemExit('Canonical hardRefresh function was not found')
          html = html.replace(old, new, 1)
          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit permanent source fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use top-level navigation for hard refresh"
          git push origin HEAD:production
