name: Deploy to Apps Script

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: apps-script-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  APPS_SCRIPT_DEPLOYMENT_ID: AKfycbyfXuvUth9j7L5-rp0TKEc3CC2gffmgo44y_VDZHwMFObT4pxuNkNrL7Jf0HX5CSQQaCQ

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run repository tests
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "tests/*.js" > /dev/null; then
            for test_file in tests/*.js; do
              echo "Running ${test_file}"
              node "${test_file}"
            done
          fi

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Build Apps Script upload directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .apps-script-deploy

          MAIN_SERVER_FILE="$(grep -Il 'const מזהה_הגיליון' -- * 2>/dev/null | head -n 1 || true)"
          if [ -z "${MAIN_SERVER_FILE}" ]; then
            echo "Could not locate the canonical main server source file."
            exit 1
          fi

          test -f V2.GS.txt
          test -f index.html
          test -f PerformanceAuditRunner.GS.txt

          cp "${MAIN_SERVER_FILE}" ".apps-script-deploy/קוד.js"
          cp V2.GS.txt .apps-script-deploy/V2.js
          cp index.html .apps-script-deploy/Index.html
          cp PerformanceAuditRunner.GS.txt .apps-script-deploy/PerformanceAudit.js

          python3 - <<'PY'
          from pathlib import Path

          path = Path('.apps-script-deploy/Index.html')
          html = path.read_text(encoding='utf-8')

          replacements = {
              '<div id="brandArea" onclick="goDashboard()">': '<div id="brandArea" onclick="BH_fullRefreshDashboard()">',
              '<div id="sideBrand" onclick="goDashboard()">': '<div id="sideBrand" onclick="BH_fullRefreshDashboard()">',
              '<button id="btn_dashboard" class="active" onclick="tab(\'dashboard\',this)">דשבורד</button>': '<button id="btn_dashboard" class="active" onclick="BH_fullRefreshDashboard(this)">דשבורד</button>',
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          marker = '</body>'
          patch = r'''
          <script id="BH_FULL_REFRESH_NAVIGATION">
          (function(){
            let refreshRunning = false;

            window.BH_fullRefreshDashboard = function(button){
              if(refreshRunning) return;
              refreshRunning = true;
              const dashboardButton = button || document.getElementById('btn_dashboard');

              const finish = function(){
                try {
                  if(typeof closeM === 'function') closeM();
                  if(typeof tab === 'function') tab('dashboard', dashboardButton);
                  else if(typeof goDashboard === 'function') goDashboard();
                } finally {
                  refreshRunning = false;
                }
              };

              if(typeof refreshCore === 'function'){
                try {
                  refreshCore(finish);
                } catch(error){
                  refreshRunning = false;
                  throw error;
                }
              } else {
                finish();
              }
            };

            function installLoginRefresh(){
              const screen = document.getElementById('loginScreen');
              if(!screen || screen.dataset.fullRefreshObserver === '1') return;

              screen.dataset.fullRefreshObserver = '1';
              let wasVisible = !screen.classList.contains('hidden');

              const observer = new MutationObserver(function(){
                const visible = !screen.classList.contains('hidden');
                if(wasVisible && !visible){
                  setTimeout(function(){
                    window.BH_fullRefreshDashboard();
                  }, 0);
                }
                wasVisible = visible;
              });

              observer.observe(screen, {
                attributes: true,
                attributeFilter: ['class']
              });
            }

            if(document.readyState === 'loading'){
              document.addEventListener('DOMContentLoaded', installLoginRefresh);
            } else {
              installLoginRefresh();
            }
          })();
          </script>
          '''

          if 'BH_FULL_REFRESH_NAVIGATION' not in html:
              if marker not in html:
                  raise SystemExit('Missing </body> marker in Index.html')
              html = html.replace(marker, patch + marker, 1)

          required = [
              'onclick="BH_fullRefreshDashboard()"',
              'onclick="BH_fullRefreshDashboard(this)"',
              'BH_FULL_REFRESH_NAVIGATION',
          ]
          missing = [token for token in required if token not in html]
          if missing:
              raise SystemExit(f'Full refresh patch verification failed: {missing}')

          path.write_text(html, encoding='utf-8')
          PY

          cat > .apps-script-deploy/appsscript.json <<'JSON'
          {
            "timeZone": "Asia/Jerusalem",
            "dependencies": {
              "enabledAdvancedServices": [
                {
                  "userSymbol": "Calendar",
                  "version": "v3",
                  "serviceId": "calendar"
                }
              ]
            },
            "webapp": {
              "executeAs": "USER_DEPLOYING",
              "access": "ANYONE"
            },
            "exceptionLogging": "STACKDRIVER",
            "runtimeVersion": "V8"
          }
          JSON

          cat > .apps-script-deploy/.clasp.json <<'JSON'
          {
            "scriptId": "13DHeGyB7146a30EFLTYLtxHJZ6zPgXWKfGqsH83hmnZGfdVWfkVsnDW3",
            "rootDir": "."
          }
          JSON

      - name: Restore clasp credentials
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CLASPRC_JSON}" ]; then
            echo "Repository secret CLASPRC_JSON is missing."
            exit 1
          fi
          printf '%s' "${CLASPRC_JSON}" > "${HOME}/.clasprc.json"
          chmod 600 "${HOME}/.clasprc.json"

      - name: Push code to Apps Script
        working-directory: .apps-script-deploy
        run: clasp push --force

      - name: Update production web app deployment
        working-directory: .apps-script-deploy
        shell: bash
        run: |
          set -euo pipefail
          clasp create-deployment \
            --deploymentId "${APPS_SCRIPT_DEPLOYMENT_ID}" \
            --description "production ${GITHUB_SHA}"
