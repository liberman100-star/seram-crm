name: Deploy to Apps Script

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: apps-script-production
  cancel-in-progress: false

permissions:
  contents: write

env:
  APPS_SCRIPT_DEPLOYMENT_ID: AKfycbyfXuvUth9j7L5-rp0TKEc3CC2gffmgo44y_VDZHwMFObT4pxuNkNrL7Jf0HX5CSQQaCQ

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run repository tests
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "tests/*.js" > /dev/null; then
            for test_file in tests/*.js; do
              echo "Running ${test_file}"
              node "${test_file}"
            done
          fi

      - name: Apply permanent refresh fix to source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          replacements = {
              '<div id="brandArea" onclick="goDashboard()">': '<div id="brandArea" onclick="BH_fullRefreshDashboard()">',
              '<div id="sideBrand" onclick="goDashboard()">': '<div id="sideBrand" onclick="BH_fullRefreshDashboard()">',
              '<button id="btn_dashboard" class="active" onclick="tab(\'dashboard\',this)">דשבורד</button>': '<button id="btn_dashboard" class="active" onclick="BH_fullRefreshDashboard()">דשבורד</button>',
              "function goDashboard(){ tab('dashboard', document.getElementById('btn_dashboard')); }": "function goDashboard(){ BH_fullRefreshDashboard(); }",
              "      hideLogin();\n      refreshCore();": "      hideLogin();\n      window.location.reload();",
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          anchor = "let SETTINGS_TAB = 'categories';"
          function_code = """

function BH_fullRefreshDashboard(){
  window.location.reload();
}
"""
          if 'function BH_fullRefreshDashboard()' not in html:
              if anchor not in html:
                  raise SystemExit('Missing JavaScript anchor in index.html')
              html = html.replace(anchor, anchor + function_code, 1)

          required = [
              'onclick="BH_fullRefreshDashboard()"',
              'function BH_fullRefreshDashboard()',
              'window.location.reload();',
          ]
          missing = [token for token in required if token not in html]
          if missing:
              raise SystemExit(f'Permanent refresh source verification failed: {missing}')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Build Apps Script upload directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .apps-script-deploy

          MAIN_SERVER_FILE="$(grep -Il 'const מזהה_הגיליון' -- * 2>/dev/null | head -n 1 || true)"
          if [ -z "${MAIN_SERVER_FILE}" ]; then
            echo "Could not locate the canonical main server source file."
            exit 1
          fi

          test -f V2.GS.txt
          test -f index.html
          test -f PerformanceAuditRunner.GS.txt

          cp "${MAIN_SERVER_FILE}" ".apps-script-deploy/קוד.js"
          cp V2.GS.txt .apps-script-deploy/V2.js
          cp index.html .apps-script-deploy/Index.html
          cp PerformanceAuditRunner.GS.txt .apps-script-deploy/PerformanceAudit.js

          cat > .apps-script-deploy/appsscript.json <<'JSON'
          {
            "timeZone": "Asia/Jerusalem",
            "dependencies": {
              "enabledAdvancedServices": [
                {
                  "userSymbol": "Calendar",
                  "version": "v3",
                  "serviceId": "calendar"
                }
              ]
            },
            "webapp": {
              "executeAs": "USER_DEPLOYING",
              "access": "ANYONE"
            },
            "exceptionLogging": "STACKDRIVER",
            "runtimeVersion": "V8"
          }
          JSON

          cat > .apps-script-deploy/.clasp.json <<'JSON'
          {
            "scriptId": "13DHeGyB7146a30EFLTYLtxHJZ6zPgXWKfGqsH83hmnZGfdVWfkVsnDW3",
            "rootDir": "."
          }
          JSON

      - name: Restore clasp credentials
        shell: bash
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CLASPRC_JSON}" ]; then
            echo "Repository secret CLASPRC_JSON is missing."
            exit 1
          fi
          printf '%s' "${CLASPRC_JSON}" > "${HOME}/.clasprc.json"
          chmod 600 "${HOME}/.clasprc.json"

      - name: Push code to Apps Script
        working-directory: .apps-script-deploy
        run: clasp push --force

      - name: Update production web app deployment
        working-directory: .apps-script-deploy
        shell: bash
        run: |
          set -euo pipefail
          clasp create-deployment \
            --deploymentId "${APPS_SCRIPT_DEPLOYMENT_ID}" \
            --description "production ${GITHUB_SHA}"

      - name: Commit permanent source fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Source already contains permanent refresh fix"
            exit 0
          fi
          git commit -m "Apply permanent dashboard refresh behavior"
          git push origin HEAD:production
